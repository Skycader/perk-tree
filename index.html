<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <!-- force desktop layout (1920x1080-class) on all devices, including phones.
         Mobile users are expected to pinch-zoom the whole page natively
         instead of getting a squeezed "responsive" layout. -->
    <meta
      name="viewport"
      content="width=1920, user-scalable=yes, initial-scale=0.3"
    />
    <title>Древо</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2032%2032%22%3E%0A%20%20%3C%21--%20nucleus%20--%3E%0A%20%20%3Ccircle%20cx%3D%2216%22%20cy%3D%2216%22%20r%3D%224%22%20fill%3D%22%23e09040%22/%3E%0A%20%20%3C%21--%20orbit%20ellipse%20rotated%20-35deg%20--%3E%0A%20%20%3Cellipse%20cx%3D%2216%22%20cy%3D%2216%22%20rx%3D%2213%22%20ry%3D%225.5%22%0A%20%20%20%20fill%3D%22none%22%20stroke%3D%22%23c87830%22%20stroke-width%3D%221%22%0A%20%20%20%20transform%3D%22rotate%28-35%2016%2016%29%22/%3E%0A%20%20%3C%21--%20electron%3A%20position%20on%20orbit%20at%20~-35deg%20angle%20%3D%20top-right%20--%3E%0A%20%20%3C%21--%20at%20angle%200%20on%20ellipse%3A%20%2816%2B13%2C%2016%29%20%3D%20%2829%2C16%29%2C%20rotate%20point%20by%20-35deg%20around%20%2816%2C16%29%20--%3E%0A%20%20%3C%21--%20cos%28-35%29%3D0.819%2C%20sin%28-35%29%3D-0.574%20--%3E%0A%20%20%3C%21--%20x%20%3D%2016%20%2B%2013%2A0.819%20%3D%2026.65%2C%20y%20%3D%2016%20%2B%205.5%2A%28-0.574%29%20%3D%2012.84%20--%3E%0A%20%20%3C%21--%20but%20we%20want%20electron%20at%20~-60deg%20on%20ellipse%20for%20top-right%20feel%20--%3E%0A%20%20%3C%21--%20angle%3D-60%3A%20x%3D16%2B13%2Acos%28-60%29%3D16%2B6.5%3D22.5%2C%20y%3D16%2B5.5%2Asin%28-60%29%3D16-4.76%3D11.24%2C%20then%20rotate%20-35%20--%3E%0A%20%20%3C%21--%20easier%3A%20just%20place%20it%20visually%20--%3E%0A%20%20%3Ccircle%20cx%3D%2224.5%22%20cy%3D%229.5%22%20r%3D%222.5%22%20fill%3D%22%23e09040%22/%3E%0A%3C/svg%3E"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #080910;
        font-family: 'JetBrains Mono', monospace;
        color: #c0bdb4;
      }

      /* ── CUSTOM SCROLLBAR ── */
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #1e2235;
        border-radius: 2px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #2e3448;
      }
      * {
        scrollbar-width: thin;
        scrollbar-color: #1e2235 transparent;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 200;
        background: linear-gradient(
          90deg,
          #0a0b13 0%,
          #0c0d18 50%,
          #0a0b13 100%
        );
        border-bottom: 1px solid #1e2235;
        box-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
        height: 46px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
      }
      .tb-left {
        display: flex;
        align-items: baseline;
        gap: 12px;
      }
      .tb-title {
        font-family: 'JetBrains Mono', monospace;
        font-size: 18px;
        font-weight: 700;
        color: #e09040;
        letter-spacing: 0.1em;
      }
      .tb-sub {
        font-size: 10px;
        color: #454a60;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      .tb-stats {
        display: flex;
        gap: 16px;
        align-items: center;
      }
      .tb-stat {
        font-size: 11px;
        color: #585e72;
      }
      .tb-stat span {
        color: #c0bdb4;
        font-weight: 500;
      }
      .tb-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 5px 14px;
        border: 1px solid #2a3050;
        background: rgba(224, 144, 64, 0.07);
        color: #e09040;
        cursor: pointer;
        transition: all 0.15s;
        font-family: inherit;
      }
      .btn:hover {
        background: rgba(224, 144, 64, 0.16);
        border-color: #e09040;
      }
      #exp-st {
        font-size: 10px;
        color: #454a60;
        margin-right: 4px;
      }

      .page {
        display: flex;
        gap: 16px;
        padding: 16px;
        align-items: flex-start;
      }
      .main-area {
        display: flex;
        flex-direction: column;
        gap: 0;
        flex: 1;
        min-width: 0;
        position: relative;
      }

      /* meta row */
      .meta-row {
        display: flex;
        gap: 8px;
      }
      .title-box {
        flex-shrink: 0;
        width: 175px;
        border: 1px solid rgba(200, 120, 48, 0.5);
        background: linear-gradient(
          135deg,
          rgba(200, 120, 48, 0.18) 0%,
          rgba(200, 120, 48, 0.06) 100%
        );
        box-shadow:
          0 4px 20px rgba(200, 120, 48, 0.15),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        padding: 10px 12px;
      }
      .title-box-name {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 16px;
        color: #e09040;
        letter-spacing: 0.08em;
      }
      .title-box-sub {
        font-size: 9px;
        color: #585e72;
        letter-spacing: 0.05em;
        margin-top: 3px;
      }
      .altnames-box {
        flex: 1;
        border: 1px solid #1e2235;
        background: linear-gradient(
          135deg,
          #13151f 0%,
          #111320 60%,
          #0f1019 100%
        );
        box-shadow:
          0 2px 12px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.03);
        padding: 10px 12px;
      }
      .altnames-label {
        font-size: 9px;
        color: #585e72;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        margin-bottom: 7px;
      }
      .altnames-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }
      .an-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 10px;
        color: #7a8090;
        background: #0f1018;
        border: 1px solid #1e2235;
        border-radius: 3px;
        padding: 2px 8px 2px 6px;
      }
      .an-tag::before {
        content: '';
        display: block;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #3a4560;
        flex-shrink: 0;
      }

      /* spacer + cols */
      .cols-row {
        display: flex;
        gap: 0;
        align-items: flex-start;
        width: 100%;
      }

      .col {
        --CONN: 22px;
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: row;
        margin-right: 20px;
        position: relative;
        align-self: flex-start;
      }
      .col:last-child {
        margin-right: 0;
      }

      .col-connector {
        width: var(--CONN);
        flex-shrink: 0;
        position: relative;
        align-self: flex-start;
      }
      .col-connector svg {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: visible;
        pointer-events: none;
      }
      .col-spine {
        position: absolute;
        left: 0;
        top: 0;
        width: var(--CONN);
        height: 100%;
        pointer-events: none;
        overflow: hidden;
        z-index: 0;
      }
      .col-connector {
        position: relative;
        z-index: 2;
        isolation: isolate;
      }

      .col-content {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-self: flex-start;
      }

      /* chapter */
      .chapter {
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .ch-hdr {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px;
        margin-bottom: 5px;
        border: 1px solid;
        flex-shrink: 0;
      }
      .ch-hdr .ch-num {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        font-weight: 500;
        color: #585e72;
        min-width: 16px;
      }
      .ch-hdr .ch-name {
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.05em;
        word-break: break-word;
      }

      .hc-o {
        background: linear-gradient(
          120deg,
          rgba(200, 120, 48, 0.18) 0%,
          rgba(200, 120, 48, 0.07) 100%
        );
        border-color: rgba(200, 120, 48, 0.5);
        box-shadow:
          0 2px 12px rgba(200, 120, 48, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      .hc-o .ch-name {
        color: #e8a050;
      }
      .hc-r {
        background: linear-gradient(
          120deg,
          rgba(160, 40, 40, 0.18) 0%,
          rgba(160, 40, 40, 0.07) 100%
        );
        border-color: rgba(160, 40, 40, 0.5);
        box-shadow:
          0 2px 12px rgba(160, 40, 40, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      .hc-r .ch-name {
        color: #d84040;
      }
      .hc-b {
        background: linear-gradient(
          120deg,
          rgba(40, 96, 168, 0.18) 0%,
          rgba(40, 96, 168, 0.07) 100%
        );
        border-color: rgba(40, 96, 168, 0.5);
        box-shadow:
          0 2px 12px rgba(40, 96, 168, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      .hc-b .ch-name {
        color: #4a90e0;
      }
      .hc-g {
        background: linear-gradient(
          120deg,
          rgba(32, 136, 80, 0.18) 0%,
          rgba(32, 136, 80, 0.07) 100%
        );
        border-color: rgba(32, 136, 80, 0.5);
        box-shadow:
          0 2px 12px rgba(32, 136, 80, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      .hc-g .ch-name {
        color: #30b868;
      }
      .hc-p {
        background: linear-gradient(
          120deg,
          rgba(96, 48, 168, 0.18) 0%,
          rgba(96, 48, 168, 0.07) 100%
        );
        border-color: rgba(96, 48, 168, 0.5);
        box-shadow:
          0 2px 12px rgba(96, 48, 168, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      .hc-p .ch-name {
        color: #8850d8;
      }
      .hc-y {
        background: linear-gradient(
          120deg,
          rgba(144, 120, 32, 0.18) 0%,
          rgba(144, 120, 32, 0.07) 100%
        );
        border-color: rgba(144, 120, 32, 0.5);
        box-shadow:
          0 2px 12px rgba(144, 120, 32, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      .hc-y .ch-name {
        color: #c8a038;
      }
      .hc-k {
        background: linear-gradient(
          120deg,
          rgba(60, 60, 60, 0.18) 0%,
          rgba(40, 40, 40, 0.07) 100%
        );
        border-color: rgba(100, 100, 100, 0.45);
        box-shadow:
          0 2px 12px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      .hc-k .ch-name {
        color: #909090;
      }

      .perks-wrap {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .perk {
        background: linear-gradient(
          135deg,
          #13151f 0%,
          #111320 50%,
          #0f1019 100%
        );
        border: 1px solid #1c1f2e;
        box-shadow:
          0 2px 8px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.03);
        padding: 7px 10px 8px;
        display: flex;
        gap: 8px;
        align-items: flex-start;
        transition:
          background 0.15s,
          box-shadow 0.15s;
        cursor: default;
        position: relative;
      }
      .perk:hover {
        background: linear-gradient(
          135deg,
          #181a28 0%,
          #151728 50%,
          #121524 100%
        );
        box-shadow:
          0 4px 16px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }
      .perk-icon {
        width: 10px;
        height: 10px;
        flex-shrink: 0;
        margin-top: 3px;
        border-radius: 1px;
      }
      .perk-body {
        flex: 1;
        min-width: 0;
        overflow: hidden;
      }
      .perk-name {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 600;
        font-size: 12px;
        color: #dedad2;
        line-height: 1.35;
        word-break: break-word;
      }
      .perk-desc {
        font-size: 10px;
        color: #585e72;
        line-height: 1.5;
        margin-top: 2px;
        word-break: break-word;
        white-space: pre-line;
      }

      .ic-o {
        background: #e09040;
      }
      .ic-r {
        background: #cc3838;
      }
      .ic-b {
        background: #3e80d0;
      }
      .ic-g {
        background: #28a860;
      }
      .ic-p {
        background: #7840c8;
      }
      .ic-y {
        background: #b89030;
      }
      .ic-k {
        background: #505050;
      }

      .perk-icon {
        transition: box-shadow 0.25s ease;
      }

      /* ── CHAIN DEPENDENCY ── */
      .perk-name-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .perk-chain {
        display: inline-flex;
        align-items: center;
        width: 13px;
        height: 13px;
        flex-shrink: 0;
        opacity: 0.4;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .perk-chain:hover {
        opacity: 1;
      }
      .perk-chain-tip {
        display: none;
        position: fixed;
        z-index: 600;
        background: #0d0e18;
        border: 1px solid #2a3050;
        padding: 8px 12px;
        font-size: 10px;
        color: #8090a0;
        pointer-events: auto;
        max-width: 240px;
        line-height: 1.6;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
      }
      .perk-chain-tip strong {
        display: block;
        color: #c0bdb4;
        margin-bottom: 6px;
        font-size: 10px;
        letter-spacing: 0.05em;
      }
      .perk-chain-dep {
        display: flex;
        align-items: center;
        gap: 7px;
        margin-top: 4px;
        cursor: pointer;
        padding: 2px 0;
        border-radius: 2px;
        transition: color 0.15s;
      }
      .perk-chain-dep:hover {
        color: #c0bdb4;
      }
      .perk-icon.glowing.ic-o {
        box-shadow:
          0 0 6px 3px rgba(224, 144, 64, 0.9),
          0 0 18px 7px rgba(224, 144, 64, 0.35);
      }
      .perk-icon.glowing.ic-r {
        box-shadow:
          0 0 6px 3px rgba(204, 56, 56, 0.9),
          0 0 18px 7px rgba(204, 56, 56, 0.35);
      }
      .perk-icon.glowing.ic-b {
        box-shadow:
          0 0 6px 3px rgba(62, 128, 208, 0.9),
          0 0 18px 7px rgba(62, 128, 208, 0.35);
      }
      .perk-icon.glowing.ic-g {
        box-shadow:
          0 0 6px 3px rgba(40, 168, 96, 0.9),
          0 0 18px 7px rgba(40, 168, 96, 0.35);
      }
      .perk-icon.glowing.ic-p {
        box-shadow:
          0 0 6px 3px rgba(120, 64, 200, 0.9),
          0 0 18px 7px rgba(120, 64, 200, 0.35);
      }
      .perk-icon.glowing.ic-y {
        box-shadow:
          0 0 6px 3px rgba(184, 144, 48, 0.9),
          0 0 18px 7px rgba(184, 144, 48, 0.35);
      }
      .perk-icon.glowing.ic-k {
        box-shadow:
          0 0 6px 3px rgba(120, 120, 120, 0.9),
          0 0 18px 7px rgba(120, 120, 120, 0.35);
      }

      /* sidebar */
      .sidebar {
        width: 210px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .sb-hdr {
        padding: 8px 10px;
        margin-bottom: 5px;
        background: linear-gradient(
          120deg,
          rgba(200, 120, 48, 0.18) 0%,
          rgba(200, 120, 48, 0.07) 100%
        );
        border: 1px solid rgba(200, 120, 48, 0.45);
        box-shadow:
          0 2px 12px rgba(200, 120, 48, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        font-weight: 600;
        color: #e09040;
        letter-spacing: 0.06em;
      }
      .rtable-wrap {
        border: 1px solid #1c1f2e;
      }
      .rtable {
        width: 100%;
        border-collapse: collapse;
      }
      .rtable th {
        font-size: 9px;
        color: #585e72;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        padding: 4px 8px;
        border-bottom: 1px solid #1c1f2e;
        text-align: left;
        background: #0e0f16;
      }
      .rtable td {
        padding: 3px 8px;
        border-bottom: 1px solid rgba(28, 31, 46, 0.5);
        vertical-align: middle;
      }
      .rtable tr:last-child td {
        border-bottom: none;
      }
      .rtable tr:nth-child(odd) td {
        background: #12141e;
      }
      .rtable tr:nth-child(even) td {
        background: #0f1019;
      }
      .r-lvl {
        font-size: 10px;
        color: #585e72;
        white-space: nowrap;
      }
      .r-name {
        font-size: 11px;
        color: #dedad2;
        font-weight: 500;
      }
      .badge {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .badge-row {
        display: flex;
        gap: 2px;
      }
      .sq {
        width: 7px;
        height: 7px;
        border-radius: 1px;
        display: inline-block;
      }
      .sq-w {
        background: #999;
        outline: 1px solid #666;
      }
      .sq-y {
        background: #a87818;
      }
      .sq-r {
        background: #902020;
      }
      .sq-b {
        background: #164890;
      }
      .sq-k {
        background: #1e1e1e;
        outline: 1px solid #363636;
      }

      /* bottom bar */
      .bottom-bar {
        margin: 16px;
      }
      .bb-hdr {
        padding: 6px 12px;
        background: rgba(180, 140, 30, 0.07);
        border: 1px solid rgba(180, 140, 30, 0.22);
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        font-weight: 600;
        color: #b89030;
        letter-spacing: 0.08em;
      }
      .bb-items {
        display: flex;
      }
      .bb-item {
        flex: 1;
        border: 1px solid #1c1f2e;
        border-top: none;
        background: #12141e;
        padding: 8px 12px;
      }
      .bb-item + .bb-item {
        border-left: none;
      }
      .bb-item-name {
        font-size: 11px;
        font-weight: 500;
        color: #cc3030;
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .bb-item-name::before {
        content: '';
        display: inline-block;
        width: 8px;
        height: 8px;
        background: #a02828;
        border-radius: 1px;
        flex-shrink: 0;
      }
      .bb-item-desc {
        font-size: 10px;
        color: #585e72;
        line-height: 1.55;
        white-space: pre-line;
      }

      /* ── SCREEN OVERLAY ── */
      #tt-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 490;
        pointer-events: auto;
        cursor: default;
      }

      /* ── TOOLTIP ── */
      .tooltip {
        display: none;
        position: fixed;
        z-index: 500;
        width: 340px;
        max-height: 82vh;
        background: #0f1018;
        border: 1px solid #2a3050;
        box-shadow:
          0 8px 40px rgba(0, 0, 0, 0.9),
          0 0 0 1px rgba(90, 106, 154, 0.15);
        pointer-events: auto;
        flex-direction: column;
        overflow: hidden;
      }
      .tooltip .tt-header {

    <script>
      // ── BACKGROUND (GRID::RUNNER sky only) ──
      (function () {
        const cv = document.getElementById('bg-canvas');
        const cx = cv.getContext('2d');
        let T = 0,
          lightnings = [];
        function resize() {
          cv.width = innerWidth;
          cv.height = innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        function lcg(seed) {
          let s = seed >>> 0;
          return () => {
            s = (1664525 * s + 1013904223) >>> 0;
            return s / 4294967296;
          };
        }
        const rnd = lcg(0xcafe1234);
        // stars in polar coords — all rotate at same speed (celestial sphere)
        const ROT_SPEED = 0.008; // rad/s
        const STARS = Array.from({ length: 160 }, () => ({
          r: 0.05 + rnd() * 0.78,
          ang: rnd() * Math.PI * 2,
          sz: rnd() < 0.14 ? 1.5 : 1,
          ph: rnd() * Math.PI * 2,
          tw: 0.28 + rnd() * 0.48,
        }));
        function drawBg(t) {
          const W = cv.width,
            H = cv.height;
          const cx0 = W / 2,
            cy0 = H / 2;
          const diag = Math.sqrt(cx0 * cx0 + cy0 * cy0) * 1.05;
          const sky = cx.createLinearGradient(0, 0, 0, H);
          sky.addColorStop(0, '#000005');
          sky.addColorStop(0.5, '#000a10');
          sky.addColorStop(1, '#001420');
          cx.fillStyle = sky;
          cx.fillRect(0, 0, W, H);
          // all stars rotate together around screen centre
          cx.save();
          cx.translate(cx0, cy0);
          cx.rotate(t * ROT_SPEED);
          STARS.forEach((s) => {
            const x = Math.cos(s.ang) * s.r * diag;
            const y = Math.sin(s.ang) * s.r * diag;
            const fl = 0.3 + 0.7 * Math.abs(Math.sin(t * s.tw + s.ph));
            cx.fillStyle = `rgba(160,220,255,${fl * 0.55})`;
            cx.fillRect(x, y, s.sz, s.sz);
          });
          cx.restore();
          // lightning
          if (Math.random() < 0.0038) lightnings.push(mkLightning(W, H));
          cx.save();
          lightnings = lightnings.filter((l) => l.a > 0.01);
          lightnings.forEach((l) => {
            l.a -= l.dk;
            drawLP(l.pts, 1.4, l.a * 0.88);
            l.br.forEach((b) => drawLP(b, 0.65, l.a * 0.36));
            if (l.a > 0.65) {
              cx.fillStyle = `rgba(100,170,255,${(l.a - 0.65) * 0.07})`;
              cx.fillRect(0, 0, W, H);
            }
          });
          cx.restore();
        }
        function mkLightning(W, H) {
          const x = rnd() * W,
            y0 = rnd() * H * 0.3,
            y1 = y0 + 50 + rnd() * 120;
          const pts = [{ x, y: y0 }];
          let cx2 = x,
            cy = y0;
          while (cy < y1) {
            cy += 7 + rnd() * 13;
            cx2 += (rnd() - 0.5) * 33;
            pts.push({ x: cx2, y: cy });

          const br = [];
          if (pts.length > 2 && rnd() > 0.52) {
            const bi = Math.floor(pts.length * 0.4);
            let bx = pts[bi].x,
              by = pts[bi].y;
            const bp = [{ x: bx, y: by }];
            for (let i = 0; i < 3 + Math.floor(rnd() * 4); i++) {
              by += 5 + rnd() * 9;
              bx += (rnd() - 0.5) * 23;
              bp.push({ x: bx, y: by });
            }
            br.push(bp);
          }
          return { pts, br, a: 1, dk: 0.046 + rnd() * 0.05 };

            const icX = sqR.left + sqR.width / 2,
              icY = sqR.top + sqR.height / 2;
            const goRight = spR.left > icX;
            const toX = goRight ? spR.left : spR.right;
            const toY = spR.top + 18;
            const vLen = Math.abs(icY - toY),
              hLen = Math.abs(toX - icX),
              total = vLen + hLen;
            // draw on separate SVG so main arrow stays intact
            let cascSvg = document.getElementById('casc-arrow-svg');
            if (!cascSvg) {
              cascSvg = document.createElementNS(
                'http://www.w3.org/2000/svg',
                'svg',
              );
              cascSvg.id = 'casc-arrow-svg';
              cascSvg.style.cssText =
                'position:fixed;left:0;top:0;pointer-events:none;z-index:519;overflow:visible;';
              document.body.appendChild(cascSvg);
            }
            cascSvg.style.width = vwA + 'px';
            cascSvg.style.height = vhA + 'px';
            cascSvg.style.display = 'block';
            cascSvg.setAttribute('viewBox', `0 0 ${vwA} ${vhA}`);
            cascSvg.innerHTML = `
        <circle cx="${icX}" cy="${icY}" r="3" fill="#50556a"/>
        <polyline points="${icX},${icY} ${icX},${toY} ${toX},${toY}"
          fill="none" stroke="#50556a" stroke-width="1.5"
          stroke-dasharray="${total}" stroke-dashoffset="${total}"
          style="animation:dashIn .3s ease forwards"/>`;
          });
        });
        ttHeader.innerHTML = '';
        ttHeader.appendChild(_sqSpan);
        ttHeader.appendChild(document.createTextNode(name));
        ttLevels.innerHTML = Object.entries(lvlDesc)
          .filter(([lvl]) => lvl !== 'combo' && /^\d+$/.test(lvl))
          .map(([lvl, txt]) => {
            const col = LEVEL_COLOURS[parseInt(lvl)] || '#585e72';
            return `<div class="tt-row"><span class="tt-lvl" style="color:${col}">${lvl}</span><span class="tt-text">${txt}</span></div>`;
          })
          .join('');

        // position & show synchronously — no timers, no rAF
        const ir = iconEl.getBoundingClientRect();
        const icX = ir.left + ir.width / 2;
        const icY = ir.top + ir.height / 2;
        const tw = 340,
          vh = window.innerHeight,
          vw = window.innerWidth;
        const GAP = 16;

        // detect if this perk lives in the LAST (rightmost) column —
        // if so, force everything (tooltip + secondary windows) to open LEFTWARD,
        // mirrored, regardless of available space on the right.
        const allCols = document.querySelectorAll('.col');
        const perkCol = iconEl.closest('.col');
        const isLastCol =
          allCols.length > 0 && perkCol === allCols[allCols.length - 1];

        const goRight = isLastCol ? false : icX + GAP + tw <= vw - 4;
        let x = goRight ? icX + GAP : icX - tw - GAP;
        if (x < 4) x = 4;
        tooltipEl.style.display = 'flex';
        tooltipEl.style.opacity = '0'; // measure without flash
        const maxH = Math.floor(vh * 0.82);
        tooltipEl.style.maxHeight = maxH + 'px';
        const actualH = Math.min(tooltipEl.scrollHeight, maxH);
        let y = icY - actualH / 2;
        if (y + actualH > vh - 8) y = vh - actualH - 8;
        if (y < 8) y = 8;

        tooltipEl.style.left = x + 'px';
        tooltipEl.style.top = y + 'px';
        tooltipEl.style.opacity = '1';

        ttOverlay.style.display = 'block';
        ttOverlay.style.background = 'rgba(0,0,0,.6)';

        // ── SECONDARY WINDOWS: tiling layout ──
        // Right column split: extra (top half) + img (bottom half), each capped at half viewport height.
        // Combo goes to the right of that column (or below the pair if no horizontal room).
        const extraBox = document.getElementById('extra-box');
        const extraContent = document.getElementById('extra-content');
        const extraSvg = document.getElementById('extra-arrow-svg');
        const imgBox = document.getElementById('img-box');
        const imgContent = document.getElementById('img-content');
        const imgHeader = document.getElementById('img-header');
        const imgArwSvg = document.getElementById('img-arrow-svg');
        const imgDots = document.getElementById('img-dots');
        const img2Box = document.getElementById('img2-box');
        const img2Content = document.getElementById('img2-content');
        const img2Header = document.getElementById('img2-header');
        const img2ArwSvg = document.getElementById('img2-arrow-svg');
        const comboBox = document.getElementById('combo-box');
        const comboLvls = document.getElementById('combo-levels');
        const comboSvg = document.getElementById('combo-arrow-svg');

        extraBox.style.display = 'none';
        extraSvg.style.display = 'none';
        imgBox.style.display = 'none';
        imgArwSvg.style.display = 'none';
        img2Box.style.display = 'none';
        img2ArwSvg.style.display = 'none';
        imgDots.classList.remove('visible');
        imgDots.innerHTML = '';
        comboBox.style.display = 'none';
        comboSvg.style.display = 'none';
        // reset any maxHeight left over from previous opens
        extraBox.style.maxHeight = '';
        imgBox.style.maxHeight = '';
        img2Box.style.maxHeight = '';
        comboBox.style.maxHeight = '';

        const perkData = D.skills
          .flatMap((s) => s.perks)
          .find((p) => p.id === _comboPerkId);
        const lvlData = (D.skillLevelDescriptions || {})[_comboPerkId];
        const combo = lvlData?.combo || null;
        const vwC = window.innerWidth,
          vhC = window.innerHeight;

        function drawLine(svg, fromRect, toRect, vertical) {
          // strict 90deg L-shape: one horizontal + one vertical segment
          // ALL coordinates rounded to whole pixels — sub-pixel positions get
          // anti-aliased across two rows/cols, which visually halves stroke opacity.
          svg.style.cssText = `display:block;position:fixed;left:0;top:0;width:${vwC}px;height:${vhC}px;pointer-events:none;z-index:499;overflow:visible;`;
          svg.setAttribute('viewBox', `0 0 ${vwC} ${vhC}`);

          const R = Math.round;
          let pts, len;
          if (vertical) {
            const fx = R(fromRect.left + 20),
              fy = R(fromRect.bottom);
            const tx = fx,
              ty = R(toRect.top);
            pts = `${fx},${fy} ${tx},${ty}`;
            len = Math.abs(ty - fy);
          } else {
            const toIsRight = toRect.left >= fromRect.right - 1;
            const fx = R(toIsRight ? fromRect.right : fromRect.left);
            const fy = R(fromRect.top + 18);
            const tx = R(toIsRight ? toRect.left : toRect.right);
            const ty = R(toRect.top + 18);
            const midX = R((fx + tx) / 2);
            pts = `${fx},${fy} ${midX},${fy} ${midX},${ty} ${tx},${ty}`;
            len = Math.abs(midX - fx) + Math.abs(ty - fy) + Math.abs(tx - midX);
          }

          svg.innerHTML = `<polyline points="${pts}" fill="none" stroke="#50556a" stroke-width="1.5"
            stroke-dasharray="${len}" stroke-dashoffset="${len}"
            style="animation:dashIn .4s ease forwards"/>`;
        }

        const hasExtra = !!perkData?.extra;
        // imgs[] takes priority over the single img key when both happen to be present
        const imgsList = Array.isArray(perkData?.imgs)
          ? perkData.imgs.filter(Boolean)
          : [];
        const useSlider = imgsList.length >= 2 && perkData?.slider === true;
        const useDualImg = imgsList.length >= 2 && perkData?.slider !== true; // separate windows
        const hasImg = imgsList.length >= 1 || !!perkData?.img;
        const hasImg2 = useDualImg && imgsList.length >= 2; // second SEPARATE window only
        const hasCombo = !!(combo && Object.keys(combo).length);

        // resolve the actual list of image sources to render for the (single) #img-box.
        // - imgs[] + slider:true  → all images go into ONE box, navigated via dots
        // - imgs[] + slider:false → first image goes to #img-box, second to #img2-box
        // - plain img             → single image, as before
        const imgSourcesRaw = imgsList.length
          ? imgsList
          : perkData?.img
            ? [perkData.img]
            : [];
        // normalize each entry to {src, title, audio}: plain strings keep title/audio=null,
        // meaning they fall back to the perk-level perkData.audio flag.
        function normalizeImgEntry(entry) {
          if (typeof entry === 'string')
            return { src: entry, title: null, audio: null };
          if (entry && typeof entry === 'object')
            return {
              src: entry.src || '',
              title: entry.title || null,
              audio: typeof entry.audio === 'boolean' ? entry.audio : null,
            };
          return { src: '', title: null, audio: null };
        }
        const imgSources = imgSourcesRaw.map(normalizeImgEntry);

        // ordered list of which secondary window "slots" are present, per WINDOW_ORDER
        const hasFlags = { IMG: hasImg, EXTRA: hasExtra, COMBO: hasCombo };
        const activeKinds = WINDOW_ORDER.filter((k) => hasFlags[k]);

        if (hasExtra || hasImg || hasCombo) {
          const TOP_MARGIN = 8,
            BOTTOM_MARGIN = 8,
            ROW_GAP = 12;
          const usableH = vhC - TOP_MARGIN - BOTTOM_MARGIN;

          // anchor strictly to the ACTUAL rendered tooltip rect (already clamped to viewport)
          const mainR = tooltipEl.getBoundingClientRect();
          const colW = 320;
          const COL_GAP = 36;
          let colX, placedLeft;
          // prefer the same side the tooltip itself is on
          if (goRight) {
            colX = mainR.right + COL_GAP;
            placedLeft = false;
            if (colX + colW > vwC - 4) {
              colX = mainR.left - colW - COL_GAP;
              placedLeft = true;
            }
          } else {
            colX = mainR.left - colW - COL_GAP;
            placedLeft = true;
            if (colX < 4) {
              colX = mainR.right + COL_GAP;
              placedLeft = false;
            }
          }
          if (colX < 4) colX = 4;
          if (colX + colW > vwC - 4) colX = vwC - colW - 4;
          // align column top with the main tooltip's top, clamped to viewport
          let colTop = mainR.top;
          if (colTop < TOP_MARGIN) colTop = TOP_MARGIN;

          // populate content — supports static images AND mp4 (auto-looped, muted, no controls)
          // helper: create the right kind of media element (img or video) for a given src
          function makeMediaEl(src, promises, altText, audioOverride) {
            const isVideo = /\.mp4($|\?)/i.test(src);
            if (isVideo) {
              const vidEl = document.createElement('video');
              vidEl.src = src;
              vidEl.autoplay = true;
              vidEl.loop = true;
              vidEl.muted = true; // always starts muted; unmuted only via the speaker toggle below
              vidEl.playsInline = true;
              vidEl.controls = false;
              vidEl.disablePictureInPicture = true;
              vidEl.setAttribute(
                'controlsList',
                'nodownload nofullscreen noremoteplayback',
              );
              if (perkData?.fit !== false) vidEl.classList.add('fit-cover');
              promises.push(
                new Promise((resolve) => {
                  vidEl.addEventListener('loadeddata', resolve, { once: true });
                  vidEl.addEventListener('error', resolve, { once: true });
                }),
              );

              // per-image audio (in imgs[] entries) overrides the perk-level perkData.audio flag.
              // audioOverride === null means "not specified at this level" → fall back to perk-level.
              const wantsAudio =
                audioOverride !== null && audioOverride !== undefined
                  ? audioOverride
                  : perkData?.audio === true;

              if (wantsAudio) {
                const wrap = document.createElement('div');
                wrap.className = 'media-audio-wrap';
                wrap.appendChild(vidEl);

                const btn = document.createElement('button');
                btn.className = 'media-audio-btn';
                btn.title = 'Включить звук';
                btn.innerHTML = svgSpeakerIcon(true); // muted icon initially
                btn.addEventListener('click', (e) => {
                  e.stopPropagation();
                  vidEl.muted = !vidEl.muted;
                  btn.innerHTML = svgSpeakerIcon(vidEl.muted);
                  btn.title = vidEl.muted ? 'Включить звук' : 'Выключить звук';
                });
                wrap.appendChild(btn);
                return wrap;
              }

              return vidEl;
            } else {
              const imgEl = document.createElement('img');
              imgEl.alt = altText || perkData.name || '';
              promises.push(
                new Promise((resolve) => {
                  imgEl.addEventListener('load', resolve, { once: true });
                  imgEl.addEventListener('error', resolve, { once: true });
                }),
              );
              imgEl.src = src;
              return imgEl;
            }
          }

          // small speaker SVG, toggles between muted/unmuted glyph
          function svgSpeakerIcon(muted) {
            return muted
              ? `<svg viewBox="0 0 16 16" width="13" height="13">
                   <path d="M2 6h2.5L8 3v10L4.5 10H2z" fill="#c0bdb4"/>
                   <line x1="10.5" y1="6" x2="14" y2="9.5" stroke="#c0bdb4" stroke-width="1.3"/>
                   <line x1="14" y1="6" x2="10.5" y2="9.5" stroke="#c0bdb4" stroke-width="1.3"/>
                 </svg>`
              : `<svg viewBox="0 0 16 16" width="13" height="13">
                   <path d="M2 6h2.5L8 3v10L4.5 10H2z" fill="#e09040"/>
                   <path d="M10.5 5.5a3.2 3.2 0 0 1 0 5" fill="none" stroke="#e09040" stroke-width="1.2"/>
                   <path d="M12 4a5.4 5.4 0 0 1 0 8" fill="none" stroke="#e09040" stroke-width="1.1" opacity="0.7"/>
                 </svg>`;
          }

          const imgLoadPromises = [];
          let _sliderIndex = 0;

          function renderSliderImage(idx) {
            // explicitly stop any currently playing video before swapping content
            imgContent.querySelectorAll('video').forEach((v) => {
              v.pause();
              v.removeAttribute('src');
              v.load();
            });
            imgContent.innerHTML = '';
            const entry = imgSources[idx];
            const el = makeMediaEl(
              entry.src,
              imgLoadPromises,
              entry.title,
              entry.audio,
            );
            imgContent.appendChild(el);
            imgHeader.textContent =
              entry.title || perkData.name || 'Иллюстрация';
            imgDots
              .querySelectorAll('.img-dot')
              .forEach((d, i) => d.classList.toggle('active', i === idx));
          }

          if (hasImg) {
            imgContent.innerHTML = '';

            if (useSlider) {
              // ONE window, multiple images, dot navigation
              _sliderIndex = 0;
              renderSliderImage(0);
              imgDots.innerHTML = imgSources
                .map(
                  (_, i) =>
                    `<span class="img-dot${i === 0 ? ' active' : ''}" data-idx="${i}"></span>`,
                )
                .join('');
              imgDots.classList.add('visible');
              imgDots.querySelectorAll('.img-dot').forEach((dot) => {
                dot.addEventListener('click', () => {
                  _sliderIndex = parseInt(dot.dataset.idx, 10);
                  renderSliderImage(_sliderIndex);
                });
              });
            } else {
              // single image (or first of imgs[] when useDualImg)
              const entry0 = imgSources[0];
              imgHeader.textContent =
                entry0.title || perkData.name || 'Иллюстрация';
              const el = makeMediaEl(
                entry0.src,
                imgLoadPromises,
                entry0.title,
                entry0.audio,
              );
              imgContent.appendChild(el);
            }
          }

          if (hasImg2) {
            const entry1 = imgSources[1];
            img2Header.textContent =
              entry1.title || perkData.name || 'Иллюстрация';
            img2Content.innerHTML = '';
            const el2 = makeMediaEl(
              entry1.src,
              imgLoadPromises,
              entry1.title,
              entry1.audio,
            );
            img2Content.appendChild(el2);
          }
          if (hasExtra) {
            const md =
              typeof marked !== 'undefined'
                ? marked.parse(perkData.extra)
                : perkData.extra.replace(/\n/g, '<br>');
            extraContent.innerHTML = md;
          }
          if (hasCombo) {
            comboLvls.innerHTML = Object.entries(combo)
              .map(([partnerId, info]) => {
                let pname = partnerId,
                  pcol = 'o';
                for (const skill of D.skills) {
                  const found = skill.perks.find((pp) => pp.id === partnerId);
                  if (found) {
                    pname = found.name;
                    const CM = {
                      orange: 'o',
                      red: 'r',
                      blue: 'b',
                      green: 'g',
                      purple: 'p',
                      yellow: 'y',
                      black: 'k',
                      o: 'o',
                      r: 'r',
                      b: 'b',
                      g: 'g',
                      p: 'p',
                      y: 'y',
                      k: 'k',
                    };
                    pcol = skill.color
                      ? CM[skill.color.toLowerCase()] || skill.color[0]
                      : chapterColour.get(skill);
                    break;
                  }
                }
                const hex =
                  {
                    o: '#e09040',
                    r: '#cc3838',
                    b: '#3e80d0',
                    g: '#28a860',
                    p: '#7840c8',
                    y: '#b89030',
                    k: '#1a0000',
                  }[pcol] || '#888';
                return `<div class="combo-item">
                <div class="combo-item-hdr" style="--combo-glow:0 0 6px 3px ${hex}88,0 0 14px 5px ${hex}44">
                  <span class="combo-sq" data-rid="${partnerId}"
                    style="display:inline-block;width:8px;height:8px;background:${hex};border-radius:1px;flex-shrink:0;cursor:pointer;transition:box-shadow .2s"
                    onmouseenter="this.style.boxShadow='0 0 6px 3px ${hex}88,0 0 14px 5px ${hex}44'"
                    onmouseleave="this.style.boxShadow=''"></span>
                  <span class="combo-item-name" data-rid="${partnerId}" style="cursor:pointer">${pname}</span>
                  ${info.reqLvl ? `<span class="combo-item-lvl">от ур. ${info.reqLvl}</span>` : ''}
                </div>
                <div class="combo-item-desc">${info.desc || ''}</div>
              </div>`;
              })
              .join('');
          }

          Promise.all(imgLoadPromises).then(() =>
            requestAnimationFrame(() =>
              requestAnimationFrame(() => {
                // ── TILED LAYOUT: column slots are HARD-capped, never overlap, never off-screen ──
                // Order of IMG vs EXTRA within the column is driven by WINDOW_ORDER.
                const colKinds = activeKinds.filter(
                  (k) => k === 'IMG' || k === 'EXTRA',
                );
                const slots = colKinds.length;

                // actual usable height FROM colTop down to the bottom margin
                const usableFromTop = vhC - colTop - BOTTOM_MARGIN;

                let extraRect = null,
                  imgRect = null;
                const boxOf = { IMG: imgBox, EXTRA: extraBox };
                const svgOf = { IMG: imgArwSvg, EXTRA: extraSvg };

                if (slots === 2) {
                  // split usable height in half, with a gap between, in WINDOW_ORDER sequence
                  const slotH = Math.floor((usableFromTop - ROW_GAP) / 2);
                  const [firstKind, secondKind] = colKinds;
                  const firstBox = boxOf[firstKind],
                    secondBox = boxOf[secondKind];

                  firstBox.style.left = colX + 'px';
                  firstBox.style.top = colTop + 'px';
                  firstBox.style.width = colW + 'px';
                  firstBox.style.maxHeight = slotH + 'px';
                  firstBox.style.display = 'flex';

                  const secondTop = colTop + slotH + ROW_GAP;
                  secondBox.style.left = colX + 'px';
                  secondBox.style.top = secondTop + 'px';
                  secondBox.style.width = colW + 'px';
                  secondBox.style.maxHeight = slotH + 'px';
                  secondBox.style.display = 'flex';

                  const firstRect = firstBox.getBoundingClientRect();
                  const secondRect = secondBox.getBoundingClientRect();
                  if (firstKind === 'EXTRA') extraRect = firstRect;
                  else imgRect = firstRect;
                  if (secondKind === 'EXTRA') extraRect = secondRect;
                  else imgRect = secondRect;

                  drawLine(svgOf[firstKind], mainR, firstRect);
                  drawLine(svgOf[secondKind], firstRect, secondRect, true);
                } else if (slots === 1) {
                  const kind = colKinds[0];
                  const box = boxOf[kind];
                  const reserveForCombo = hasCombo
                    ? Math.floor((usableFromTop - ROW_GAP) / 2)
                    : vhC - colTop - BOTTOM_MARGIN;
                  box.style.left = colX + 'px';
                  box.style.top = colTop + 'px';
                  box.style.width = colW + 'px';
                  box.style.maxHeight = reserveForCombo + 'px';
                  box.style.display = 'flex';
                  const rect = box.getBoundingClientRect();
                  if (kind === 'EXTRA') extraRect = rect;
                  else imgRect = rect;
                  drawLine(svgOf[kind], mainR, rect);
                }

                // base column rect (extra and/or img), or mainR if neither is present
                const baseColRect =
                  imgRect && extraRect
                    ? {
                        left: Math.min(extraRect.left, imgRect.left),
                        right: Math.max(extraRect.right, imgRect.right),
                        top: Math.min(extraRect.top, imgRect.top),
                        bottom: Math.max(extraRect.bottom, imgRect.bottom),
                      }
                    : extraRect || imgRect || mainR;

                // IMG2 (separate window for imgs[1] when slider:false) — same rule as combo's
                // "3rd window below" pattern, but always anchored to baseColRect (not combo).
                let img2Rect = null;
                if (hasImg2) {
                  const noColumnYet = !extraRect && !imgRect;
                  img2Box.style.display = 'flex';
                  img2Box.style.maxHeight = Math.floor(vhC * 0.7) + 'px';
                  const i2w = colW; // match the width used for img-box/extra-box, not the smaller default
                  img2Box.style.width = i2w + 'px';
                  let i2x, i2y, i2Below;
                  if (noColumnYet) {
                    i2y = mainR.top;
                    i2x = placedLeft ? mainR.left - i2w - 36 : mainR.right + 36;
                    i2Below = false;
                  } else {
                    i2x = baseColRect.left;
                    i2y = baseColRect.bottom + 16;
                    i2Below = true;
                  }
                  const i2h = Math.min(img2Box.scrollHeight || 200, vhC * 0.7);
                  const i2AvailBelow = vhC - i2y - 8;
                  if (i2Below && i2h > i2AvailBelow) {
                    img2Box.style.maxHeight = Math.max(i2AvailBelow, 80) + 'px';
                  } else if (i2y + i2h > vhC - 8) {
                    i2y = vhC - i2h - 8;
                  }
                  if (i2y < 8) i2y = 8;
                  if (i2x < 4) i2x = 4;
                  if (i2x + i2w > vwC - 4) i2x = vwC - i2w - 4;
                  img2Box.style.left = i2x + 'px';
                  img2Box.style.top = i2y + 'px';
                  img2Rect = img2Box.getBoundingClientRect();
                  drawLine(
                    img2ArwSvg,
                    noColumnYet ? mainR : baseColRect,
                    img2Rect,
                    i2Below,
                  );
                }

                // COMBO placement rule:
                //  - if there IS a column (extra and/or img and/or img2 already shown) → combo goes BELOW it
                //  - if combo is the ONLY secondary window → it IS the "2nd window",
                //    beside the levels tooltip, same side as the rest of the chain (placedLeft)
                if (hasCombo) {
                  const isOnlySecondary = !extraRect && !imgRect && !img2Rect;
                  const colRect = img2Rect
                    ? {
                        left: Math.min(baseColRect.left, img2Rect.left),
                        right: Math.max(baseColRect.right, img2Rect.right),
                        top: Math.min(baseColRect.top, img2Rect.top),
                        bottom: Math.max(baseColRect.bottom, img2Rect.bottom),
                      }
                    : baseColRect;

                  const cw = 320;
                  comboBox.style.display = 'flex';
                  comboBox.style.maxHeight = Math.floor(vhC * 0.7) + 'px';

                  let cx, cy, isBelow;

                  // perkData.windows.combo === 'left' / 'right' forces combo to sit
                  // BESIDE the levels tooltip (not below the img/extra column),
                  // as long as that side is actually free — i.e. nothing (img/extra/img2 column)
                  // already occupies that space. This applies REGARDLESS of whether combo
                  // is the only secondary window or comes after img/extra.
                  const forcedSide = perkData?.windows?.combo; // 'left' | 'right' | undefined
                  const rightX = mainR.right + 36;
                  const leftX = mainR.left - cw - 36;
                  const rightFits = rightX + cw <= vwC - 4;
                  const leftFits = leftX >= 4;
                  // does the forced side overlap the column that's already placed (img/extra)?
                  function overlapsColumn(testX) {
                    if (!colRect || colRect === mainR) return false;
                    return testX < colRect.right && testX + cw > colRect.left;
                  }

                  // when forced beside, drop slightly below the main tooltip's header
                  // instead of aligning flush with its top edge.
                  const BESIDE_HEADER_OFFSET = 40;

                  let placedBeside = false;
                  if (
                    forcedSide === 'left' &&
                    leftFits &&
                    !overlapsColumn(leftX)
                  ) {
                    cx = leftX;
                    cy = mainR.top + BESIDE_HEADER_OFFSET;
                    isBelow = false;
                    placedBeside = true;
                  } else if (
                    forcedSide === 'right' &&
                    rightFits &&
                    !overlapsColumn(rightX)
                  ) {
                    cx = rightX;
                    cy = mainR.top + BESIDE_HEADER_OFFSET;
                    isBelow = false;
                    placedBeside = true;
                  }

                  if (!placedBeside) {
                    if (isOnlySecondary) {
                      // act as the 2nd window: beside the levels tooltip, default side = placedLeft
                      cy = mainR.top;
                      cx = placedLeft ? leftX : rightX;
                      isBelow = false;
                    } else {
                      // act as 3rd window: strictly below the existing column
                      cx = colRect.left;
                      cy = colRect.bottom + 16;
                      isBelow = true;
                    }
                  }

                  const ch = Math.min(comboBox.scrollHeight || 200, vhC * 0.7);
                  // If it would overflow the bottom, shrink its max-height to fit
                  // INSTEAD of moving it upward (which would re-overlap the window above it).
                  const availableBelow = vhC - cy - 8;
                  if (isBelow && ch > availableBelow) {
                    comboBox.style.maxHeight =
                      Math.max(availableBelow, 80) + 'px';
                  } else if (cy + ch > vhC - 8) {
                    cy = vhC - ch - 8;
                  }
                  if (cy < 8) cy = 8;
                  if (cx < 4) cx = 4;
                  if (cx + cw > vwC - 4) cx = vwC - cw - 4;
                  comboBox.style.left = cx + 'px';
                  comboBox.style.top = cy + 'px';
                  const comboRect = comboBox.getBoundingClientRect();
                  if (placedBeside) {
                    // straight horizontal line at the combo box's OWN header height —
                    // drawn directly (not via drawLine's generic L-shape helper) to avoid
                    // a vertical segment that visually doubles up with the main connector.
                    const R2 = Math.round;
                    const lineY = R2(comboRect.top + 18);
                    // anchor to the SAME vertical line (icX) that connects the perk icon
                    // to the main tooltip, rather than to the tooltip's own edge.
                    const fromX = R2(icX);
                    const toX = R2(
                      forcedSide === 'left' ? comboRect.right : comboRect.left,
                    );
                    const len2 = Math.abs(toX - fromX);
                    comboSvg.style.cssText = `display:block;position:fixed;left:0;top:0;width:${vwC}px;height:${vhC}px;pointer-events:none;z-index:499;overflow:visible;`;
                    comboSvg.setAttribute('viewBox', `0 0 ${vwC} ${vhC}`);
                    comboSvg.innerHTML = `<line x1="${fromX}" y1="${lineY}" x2="${toX}" y2="${lineY}"
                  stroke="#50556a" stroke-width="1.5"
                  stroke-dasharray="${len2}" stroke-dashoffset="${len2}"
                  style="animation:dashIn .4s ease forwards"/>`;
                  } else {
                    drawLine(comboSvg, colRect, comboRect, isBelow);
                  }

                  comboLvls
                    .querySelectorAll('.combo-sq, .combo-item-name')
                    .forEach((sq) => {
                      sq.addEventListener('click', () => {
                        const rid = sq.dataset.rid;
                        const allPerks = document.querySelectorAll('.perk');
                        let target = null;
                        for (const pe of allPerks) {
                          if (pe.dataset.perkId === rid) {
                            target = pe;
                            break;
                          }
                        }
                        if (!target) return;
                        hideTooltip();
                        target.scrollIntoView({
                          behavior: 'smooth',
                          block: 'center',
                        });
                        setTimeout(() => {
                          let fo = document.getElementById('focus-overlay');
                          if (!fo) {
                            fo = document.createElement('div');
                            fo.id = 'focus-overlay';
                            fo.style.cssText =
                              'position:fixed;inset:0;background:rgba(0,0,0,0);z-index:50;pointer-events:auto;transition:background .35s ease;';
                            document.body.appendChild(fo);
                          }
                          requestAnimationFrame(() => {
                            fo.style.background = `rgba(0,0,0,${FOCUS_DIM})`;
                          });
                          target.style.position = 'relative';
                          target.style.zIndex = '51';
                          target.style.transition = 'box-shadow .35s ease';
                          const _ic = target.querySelector('.perk-icon');
                          const _cm = {
                            'ic-o': '#e09040',
                            'ic-r': '#cc3838',
                            'ic-b': '#3e80d0',
                            'ic-g': '#28a860',
                            'ic-p': '#7840c8',
                            'ic-y': '#b89030',
                            'ic-k': '#1a0000',
                          };
                          const _hex =
                            Object.entries(_cm).find(
                              ([k]) => _ic && _ic.classList.contains(k),
                            )?.[1] || '#e09040';
                          target.style.boxShadow = `0 0 0 2px ${_hex},0 0 30px ${_hex}80`;
                          function clearFocus() {
                            fo.style.background = 'rgba(0,0,0,0)';
                            target.style.boxShadow = '';
                            window.removeEventListener('scroll', clearFocus, {
                              passive: true,
                            });
                            window.removeEventListener('click', clearFocus);
                            window.removeEventListener('keydown', clearFocus);
                            setTimeout(() => {
                              fo.remove();
                              target.style.position = '';
                              target.style.zIndex = '';
                              target.style.transition = '';
                            }, 350);
                          }
                          fo.addEventListener('click', clearFocus);
                          setTimeout(() => {
                            window.addEventListener('scroll', clearFocus, {
                              once: true,
                              passive: true,
                            });
                            window.addEventListener('keydown', clearFocus, {
                              once: true,
                            });
                          }, 400);
                        }, 500);
                      });
                    });
                }
              }),
            ),
          );
        }

        // draw L-line — terminates at the NEAR edge of the tooltip, never runs underneath it
        const ttHeaderMidY = y + 18;
        const toX = goRight ? x : x + tw; // near edge: left edge if goRight, right edge if not
        const cornerY = ttHeaderMidY;
        const vLen = Math.abs(icY - cornerY);
        const hLen = Math.abs(toX - icX);
        const total = vLen + hLen;

        ttArrowSvg.style.cssText = `display:block;position:fixed;left:0;top:0;width:${vw}px;height:${vh}px;pointer-events:none;z-index:499;overflow:visible;`;
        ttArrowSvg.setAttribute('viewBox', `0 0 ${vw} ${vh}`);
        ttArrowSvg.innerHTML = `
    <circle cx="${icX}" cy="${icY}" r="3" fill="#50556a"/>
    <polyline points="${icX},${icY} ${icX},${cornerY} ${toX},${cornerY}"
      fill="none" stroke="#50556a" stroke-width="1.5"
      stroke-dasharray="${total}" stroke-dashoffset="${total}"
      style="animation:dashIn .3s ease forwards"/>`;
      }

      function hideTooltip() {
        if (!_isVisible) return;
        _isVisible = false;
        tooltipEl.style.display = 'none';
        tooltipEl.style.maxHeight = '';
        tooltipEl.style.opacity = '0';
        ttOverlay.style.display = 'none';
        ttOverlay.style.background = 'rgba(0,0,0,0)';
        ttArrowSvg.style.display = 'none';
        ttArrowSvg.innerHTML = '';
        document.getElementById('extra-box').style.display = 'none';
        document.getElementById('extra-arrow-svg').style.display = 'none';
        document.getElementById('img-box').style.display = 'none';
        document.getElementById('img-arrow-svg').style.display = 'none';
        document.getElementById('img-dots').classList.remove('visible');
        document.getElementById('img2-box').style.display = 'none';
        document.getElementById('img2-arrow-svg').style.display = 'none';
        // stop any playing video so audio doesn't keep going in the background
        document
          .querySelectorAll('#img-content video, #img2-content video')
          .forEach((v) => {
            v.pause();
            v.removeAttribute('src');
            v.load();
          });
        document.getElementById('combo-box').style.display = 'none';
        document.getElementById('combo-arrow-svg').style.display = 'none';
        document.body.style.overflow = '';
        if (_currentBtn) {
          _currentBtn.classList.remove('glowing');
          _currentBtn = null;
        }
      }

      // close on Escape key
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') hideTooltip();
      });
      // close on click outside tooltip
      ttOverlay.addEventListener('click', hideTooltip);

      // ── SVG CONNECTOR DRAWING ──
      function svgLine(x1, y1, x2, y2, stroke, sw = 1.5) {
        const l = document.createElementNS(
          'http://www.w3.org/2000/svg',
          'line',
        );
        l.setAttribute('x1', x1);
        l.setAttribute('y1', y1);
        l.setAttribute('x2', x2);
        l.setAttribute('y2', y2);
        l.setAttribute('stroke', stroke);
        l.setAttribute('stroke-width', sw);
        return l;
      }
      function svgArrowRight(svg, x, y, fill) {
        const p = document.createElementNS(
          'http://www.w3.org/2000/svg',
          'polygon',
        );
        p.setAttribute(
          'points',
          `${x},${y} ${x - 5},${y - 3} ${x - 5},${y + 3}`,
        );
        p.setAttribute('fill', fill);
        svg.appendChild(p);
      }
      function svgArrowDown(svg, x, y, fill) {
        const p = document.createElementNS(
          'http://www.w3.org/2000/svg',
          'polygon',
        );
        p.setAttribute(
          'points',
          `${x},${y} ${x - 4},${y - 7} ${x + 4},${y - 7}`,
        );
        p.setAttribute('fill', fill);
        svg.appendChild(p);
      }

      function relTop(el, ancestor) {
        let t = 0,
          cur = el;
        while (cur && cur !== ancestor) {
          t += cur.offsetTop;
          cur = cur.offsetParent;
        }
        return t;
      }

      function drawColumn({ connEl, connSvg, contentEl, chRefs, spineSvg }) {
        const CONN = 22;
        const mx = CONN / 2;

        // measure everything relative to connEl (same top as contentEl since they are flex siblings)
        const base = connEl.getBoundingClientRect().top;

        function yOf(el, offset) {
          const r = el.getBoundingClientRect();
          return r.top - base + offset;
        }
        function midOf(el) {
          return yOf(el, el.offsetHeight / 2);
        }
        function iconOf(el) {
          return yOf(el, 15);
        }

        // collect targets
        const targets = [];
        chRefs.forEach(({ hdr, pw, c }) => {
          targets.push({ y: midOf(hdr), isHdr: true, c });
          pw.querySelectorAll('.perk').forEach((p) => {
            targets.push({ y: iconOf(p), isHdr: false, c });
          });
        });
        if (!targets.length) return;

        // total svg height = bottom of last target + small padding
        const svgH = targets[targets.length - 1].y + 20;
        connEl.style.height = svgH + 'px';
        connSvg.innerHTML = '';
        connSvg.setAttribute('viewBox', `0 0 ${CONN} ${svgH}`);

        // 1. grey gap segments between chapters (drawn first = behind)
        for (let i = 0; i < chRefs.length - 1; i++) {
          const lastPerk = Array.from(
            chRefs[i].pw.querySelectorAll('.perk'),
          ).pop();
          const nextHdr = chRefs[i + 1].hdr;
          if (!lastPerk || !nextHdr) continue;
          connSvg.appendChild(
            svgLine(mx, iconOf(lastPerk), mx, midOf(nextHdr), '#50556a'),
          );
        }

        // 2. coloured vertical spine within each chapter (drawn second = in front of grey)
        chRefs.forEach(({ hdr, pw, c }) => {
          const col = COL_HEX[c] || SPINE;
          const perks = Array.from(pw.querySelectorAll('.perk'));
          const spineT = midOf(hdr);
          const spineB = perks.length
            ? iconOf(perks[perks.length - 1])
            : spineT;
          connSvg.appendChild(svgLine(mx, spineT, mx, spineB, col));
        });

        // 3. branches + arrowheads (drawn last = on top)
        targets.forEach(({ y, isHdr, c }) => {
          const col = COL_HEX[c] || SPINE;
          connSvg.appendChild(svgLine(mx, y, isHdr ? CONN : CONN - 3, y, col));
          if (!isHdr) svgArrowRight(connSvg, CONN + 1, y, col);
        });
      }

      function drawTopBus() {
        const old = document.getElementById('top-bus-svg');
        if (old) old.remove();

        const mainArea = document.getElementById('main-area');
        const titleBox = document.getElementById('title-box');
        const anBox2 = document.getElementById('altnames-box');
        const spacer = document.getElementById('bus-spacer');
        const colsRowEl = document.getElementById('cols-row');
        if (!mainArea || !titleBox || !spacer || !colsRowEl) return;
        mainArea.style.position = 'relative';

        // All coords relative to mainArea using offsetLeft/offsetTop
        function off(el) {
          let l = 0,
            t = 0,
            cur = el;
          while (cur && cur !== mainArea) {
            l += cur.offsetLeft;
            t += cur.offsetTop;
            cur = cur.offsetParent;
          }
          return {
            left: l,
            top: t,
            right: l + el.offsetWidth,
            bottom: t + el.offsetHeight,
            w: el.offsetWidth,
            h: el.offsetHeight,
          };
        }

        const tb = off(titleBox);
        const an = off(anBox2);
        const sp = off(spacer);

        const busY = sp.top + sp.h / 2;
        const src1X = tb.left + tb.w / 2;
        const src1Y = tb.bottom;
        const src2X = an.left + an.w / 2;
        const src2Y = an.bottom;

        // target Xs: mid of first ch-hdr in each col
        const txs = [],
          hdrTops = [];
        colsRowEl.querySelectorAll('.col').forEach((col) => {
          const hdr = col.querySelector('.ch-hdr');
          if (!hdr) return;
          const r = off(hdr);
          txs.push(r.left + r.w / 2);
          hdrTops.push(r.top);
        });
        if (!txs.length) return;

        const W = mainArea.offsetWidth;
        const H = (hdrTops[0] || sp.bottom) + 10;

        const svg = document.createElementNS(
          'http://www.w3.org/2000/svg',
          'svg',
        );
        svg.id = 'top-bus-svg';
        svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
        svg.style.cssText = `position:absolute;left:0;top:0;width:${W}px;height:${H}px;pointer-events:none;overflow:visible;z-index:5;`;

        const S = '#50556a';
        const ln = (x1, y1, x2, y2) => {
          const l = svgLine(x1, y1, x2, y2, S);
          svg.appendChild(l);
        };

        ln(src1X, src1Y, src1X, busY);
        ln(src2X, src2Y, src2X, busY);
        const allXs = [src1X, src2X, ...txs];
        ln(Math.min(...allXs), busY, Math.max(...allXs), busY);
        txs.forEach((tx, i) => {
          const hTop = hdrTops[i] ?? busY;
          ln(tx, busY, tx, hTop - 7);
          svgArrowDown(svg, tx, hTop, S);
        });

        mainArea.appendChild(svg);
      }
      // ── SPECTRE TOOLTIP ──
      const spTooltip = document.getElementById('sp-tooltip');
      const spOverlay = document.getElementById('sp-overlay');
      const spHeader = document.getElementById('sp-header');
      const spLevels = document.getElementById('sp-levels');
      let _spectreOpen = false;

      const COLOUR_KEYS = {
        red: '#cc3838',
        orange: '#e09040',
        yellow: '#b89030',
        blue: '#3e80d0',
        green: '#28a860',
        purple: '#7840c8',
        black: '#282827',
      };

      function showSpectre(iconEl) {
        if (!D.spectre) return;
        _spectreOpen = true;
        document.body.style.overflow = 'hidden';

        spHeader.textContent = 'Палитра цветов';
        spLevels.innerHTML = Object.entries(D.spectre)
          .map(([colour, txt]) => {
            const hex = COLOUR_KEYS[colour] || '#888';
            return `<div class="tt-row">
      <span style="display:inline-block;width:10px;height:10px;background:${hex};border-radius:1px;flex-shrink:0;margin-top:2px"></span>
      <span class="tt-text">${txt}</span>
    </div>`;
          })
          .join('');

        spTooltip.style.display = 'flex';
        spTooltip.style.opacity = '1';
        const ir = iconEl.getBoundingClientRect();
        const icX = ir.left + ir.width / 2;
        const icY = ir.top + ir.height / 2;
        const tw = 340,
          vh = window.innerHeight,
          vw = window.innerWidth;
        const goRight = icX + 16 + tw <= vw - 4;
        let x = goRight ? icX + 16 : icX - tw - 16;
        if (x < 4) x = 4;
        spTooltip.style.maxHeight = Math.floor(vh * 0.82) + 'px';
        const actualH = Math.min(spTooltip.scrollHeight, Math.floor(vh * 0.82));
        let y = icY - actualH / 2;
        if (y + actualH > vh - 8) y = vh - actualH - 8;
        if (y < 8) y = 8;
        spTooltip.style.left = x + 'px';
        spTooltip.style.top = y + 'px';

        spOverlay.style.display = 'block';
        spOverlay.style.background = 'rgba(0,0,0,.6)';
        spOverlay.addEventListener('click', hideSpectre);

        // draw L-line from icon to sp-tooltip header
        const ttHeaderMidY = y + 18;
        const toX = goRight ? x : x + tw;
        const vLen = Math.abs(icY - ttHeaderMidY);
        const hLen = Math.abs(toX - icX);
        const total = vLen + hLen;
        const vw2 = vw;
        const vh2 = vh;

        ttArrowSvg.style.cssText = `display:block;position:fixed;left:0;top:0;width:${vw2}px;height:${vh2}px;pointer-events:none;z-index:499;overflow:visible;`;
        ttArrowSvg.setAttribute('viewBox', `0 0 ${vw2} ${vh2}`);
        ttArrowSvg.innerHTML = `
    <circle cx="${icX}" cy="${icY}" r="3" fill="#50556a"/>
    <polyline points="${icX},${icY} ${icX},${ttHeaderMidY} ${toX},${ttHeaderMidY}"
      fill="none" stroke="#50556a" stroke-width="1.5"
      stroke-dasharray="${total}" stroke-dashoffset="${total}"
      style="animation:dashIn .3s ease forwards"/>`;
      }

      function hideSpectre() {
        _spectreOpen = false;
        spTooltip.style.display = 'none';
        spOverlay.style.display = 'none';
        spOverlay.style.background = '';
        document.body.style.overflow = '';
        const cascSvg2 = document.getElementById('casc-arrow-svg');
        if (cascSvg2) cascSvg2.style.display = 'none';
        // also clear main arrow SVG (used for title-box spectre line)
        ttArrowSvg.style.display = 'none';
        ttArrowSvg.innerHTML = '';
        const titleIcon = document.querySelector('#title-name span');
        if (titleIcon) titleIcon.style.boxShadow = '';
      }
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          hideTooltip();
          hideSpectre();
        }
      });

      // ── DRAW ──
      function redrawAll() {
        colRefs.forEach(drawColumn);
        drawTopBus();
      }

      window.addEventListener('resize', () => requestAnimationFrame(redrawAll));
      document.fonts.ready.then(() =>
        requestAnimationFrame(() => requestAnimationFrame(redrawAll)),
      );

      // ── PNG EXPORT ──
      async function exportPNG() {
        const st = document.getElementById('exp-st');
        st.textContent = 'Загрузка…';
        const s = document.createElement('script');
        s.src =
          'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        document.head.appendChild(s);
        await new Promise((res, rej) => {
          s.onload = res;
          s.onerror = rej;
        });
        st.textContent = 'Рендеринг…';
        const root = document.getElementById('export-root');
        const cv = await html2canvas(root, {
          backgroundColor: '#0c0d14',
          scale: 2,
          useCORS: true,
          logging: false,
          windowWidth: root.scrollWidth,
          width: root.scrollWidth,
        });
        const a = document.createElement('a');
        a.download = `${D.tabName}_perks.png`;
        a.href = cv.toDataURL('image/png');
        a.click();
        st.textContent = '✓';
        setTimeout(() => {
          st.textContent = '';
        }, 3000);
      }
      // ── LICENSE modal ──
      let _licenseLoaded = false;
      const licenseToolbar = document.getElementById('license-toolbar');
      const licenseOverlay = document.getElementById('license-overlay');
      const licenseModal = document.getElementById('license-modal');
      const licenseContent = document.getElementById('license-content');
      const licenseDownload = document.getElementById('license-download');

      async function showLicense() {
        licenseModal.classList.add('visible');
        licenseOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';

        if (!_licenseLoaded) {
          try {
            const res = await fetch('LICENSE');
            if (!res.ok) throw new Error('not found');
            const text = await res.text();
            licenseContent.textContent = text;
            const blob = new Blob([text], { type: 'text/plain' });
            licenseDownload.href = URL.createObjectURL(blob);
            _licenseLoaded = true;
          } catch (e) {
            licenseContent.textContent =
              'Не удалось загрузить файл LICENSE.\nУбедитесь, что он лежит рядом с этой страницей в той же папке/репозитории.';
            licenseDownload.href = '#';
          }
        }
      }
      function hideLicense() {
        licenseModal.classList.remove('visible');
        licenseOverlay.classList.remove('active');
        document.body.style.overflow = '';
      }

      licenseToolbar.addEventListener('click', showLicense);
      licenseOverlay.addEventListener('click', hideLicense);
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') hideLicense();
      });
    </script>
  </body>
