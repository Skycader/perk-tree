        imgDots.innerHTML = '';
        comboBox.style.display = 'none';
        comboSvg.style.display = 'none';
        // reset any maxHeight left over from previous opens
        extraBox.style.maxHeight = '';
        tipBox.style.maxHeight = '';
        extendedBox.style.maxHeight = '';
        imgBox.style.maxHeight = '';
        img2Box.style.maxHeight = '';
        comboBox.style.maxHeight = '';

        const perkData = D.skills
          .flatMap((s) => s.perks)
          .find((p) => p.id === _comboPerkId);
        const lvlData = (D.skillLevelDescriptions || {})[_comboPerkId];
        const combo = lvlData?.combo || null;
        const vwC = window.innerWidth,
          vhC = window.innerHeight;

        // Explicitly pin #img-content / #img2-content / #extra-content to a real
        // px height derived from their box's actual maxHeight, MINUS the header
        // and padding. max-height:% inside them is unreliable when the box's own
        // height comes from a JS-set maxHeight on a flex:1 ancestor — browsers
        // don't always resolve that percentage chain correctly, which let the
        // <img>/<video> render at its natural (larger) size and get clipped by
        // the box's overflow:hidden instead of being shrunk to fit.
        function pinContentHeight(box, contentSelector) {
          const content = box.querySelector(contentSelector);
          if (!content) return;
          const header = box.querySelector('.tt-header');
          const headerH = header ? header.getBoundingClientRect().height : 0;
          const boxMaxH =
            parseFloat(box.style.maxHeight) ||
            box.getBoundingClientRect().height;
          const contentH = Math.max(40, boxMaxH - headerH);

          const hasMedia = !!content.querySelector('img,video');
          if (hasMedia) {
            // media containers need an explicit height so that max-height:100%
            // on the <img>/<video> resolves correctly against a flex:1 ancestor.
            content.style.height = contentH + 'px';
            content.style.maxHeight = contentH + 'px';
          } else {
            // text containers: height = actual content size capped at contentH.
            // This makes the box shrink when text is short, grow when text is long,
            // without ever exceeding the allocated slot.
            content.style.maxHeight = contentH + 'px';
            const naturalH = Math.min(
              content.scrollHeight || contentH,
              contentH,
            );
            content.style.height = naturalH + 'px';
          }

          // If the media's natural (width-constrained) height would exceed the
          // available contentH, drop its max-height cap so it renders at full
          // natural size and the container actually scrolls the overflow,
          // instead of object-fit:contain squeezing it into a tiny sliver.
          const media = content.querySelector('img,video');
          if (media) {
            const cw = content.clientWidth - 20; // minus the container's own padding
            const naturalW =
              media.tagName === 'IMG' ? media.naturalWidth : media.videoWidth;
            const naturalH =
              media.tagName === 'IMG' ? media.naturalHeight : media.videoHeight;
            if (naturalW && naturalH) {
              const renderedH = cw * (naturalH / naturalW); // height if scaled to fit width
              const overflows = renderedH > contentH;
              media.classList.toggle('media-overflow', overflows);
              // enable scroll on the container only when media genuinely overflows —
              // otherwise keep it hidden so no spurious scrollbar appears
              content.classList.toggle('needs-scroll', overflows);
            } else {
              // dimensions not yet known (still loading) — no scroll
              content.classList.remove('needs-scroll');
            }
          }
        }

        function drawLine(svg, fromRect, toRect, vertical) {
          // strict 90deg L-shape: one horizontal + one vertical segment
          // ALL coordinates rounded to whole pixels — sub-pixel positions get
          // anti-aliased across two rows/cols, which visually halves stroke opacity.
          svg.style.cssText = `display:block;position:fixed;left:0;top:0;width:${vwC}px;height:${vhC}px;pointer-events:none;z-index:499;overflow:visible;`;
          svg.setAttribute('viewBox', `0 0 ${vwC} ${vhC}`);

          const R = Math.round;
          let pts, len;
          if (vertical) {
            const fx = R(fromRect.left + 20),
              fy = R(fromRect.bottom);
            const tx = fx,
              ty = R(toRect.top);
            pts = `${fx},${fy} ${tx},${ty}`;
            len = Math.abs(ty - fy);
          } else {
            const toIsRight = toRect.left >= fromRect.right - 1;
            const fx = R(toIsRight ? fromRect.right : fromRect.left);
            const fy = R(fromRect.top + 18);
            const tx = R(toIsRight ? toRect.left : toRect.right);
            const ty = R(toRect.top + 18);
            const midX = R((fx + tx) / 2);
            pts = `${fx},${fy} ${midX},${fy} ${midX},${ty} ${tx},${ty}`;
            len = Math.abs(midX - fx) + Math.abs(ty - fy) + Math.abs(tx - midX);
          }

          svg.innerHTML = `<polyline points="${pts}" fill="none" stroke="#50556a" stroke-width="1.5"
            stroke-dasharray="${len}" stroke-dashoffset="${len}"
            style="animation:dashIn .4s ease forwards"/>`;
        }

        const hasExtra = !!perkData?.extra;
        const hasTip = !!perkData?.tip;
        // extended lives in skillLevelDescriptions[perkId].extended (like combo)
        const hasExtended = !!lvlData?.extended;
        // imgs[] takes priority over the single img key when both happen to be present
        const imgsList = Array.isArray(perkData?.imgs)
          ? perkData.imgs.filter(Boolean)
          : [];
        const useSlider = imgsList.length >= 2 && perkData?.slider === true;
        const useDualImg = imgsList.length >= 2 && perkData?.slider !== true; // separate windows
        const hasImg = imgsList.length >= 1 || !!perkData?.img;
        const hasImg2 = useDualImg && imgsList.length >= 2; // second SEPARATE window only
        const hasCombo = !!(combo && Object.keys(combo).length);

        // resolve the actual list of image sources to render for the (single) #img-box.
        // - imgs[] + slider:true  → all images go into ONE box, navigated via dots
        // - imgs[] + slider:false → first image goes to #img-box, second to #img2-box
        // - plain img             → single image, as before
        const imgSourcesRaw = imgsList.length
          ? imgsList
          : perkData?.img
            ? [perkData.img]
            : [];
        // normalize each entry to {src, title, audio}: plain strings keep title/audio=null,
        // meaning they fall back to the perk-level perkData.audio flag.
        function normalizeImgEntry(entry) {
          if (typeof entry === 'string')
            return { src: entry, title: null, audio: null, height: null };
          if (entry && typeof entry === 'object')
            return {
              src: entry.src || '',
              title: entry.title || null,
              audio: typeof entry.audio === 'boolean' ? entry.audio : null,
              height: entry.height || null, // 'maximum' = fill all available height
            };
          return { src: '', title: null, audio: null, height: null };
        }
        const imgSources = imgSourcesRaw.map(normalizeImgEntry);

        // ordered list of which secondary window "slots" are present, per WINDOW_PRIORITY
        const hasFlags = {
          IMG: hasImg,
          EXTRA: hasExtra,
          TIP: hasTip,
          EXTENDED: hasExtended,
          COMBO: hasCombo,
        };
        // perkData.priority: optional local override of window order for this perk only.
        // e.g. priority: ['COMBO', 'IMG', 'EXTRA'] — only listed kinds are reordered,
        // unlisted kinds keep their WINDOW_PRIORITY position at the end.
        const localPriority = (() => {
          const p = perkData?.priority;
          if (!Array.isArray(p) || !p.length) return WINDOW_PRIORITY;
          const upper = p.map((k) => k.toUpperCase());
          // merge: listed kinds first (in given order), then remaining from WINDOW_PRIORITY
          const rest = WINDOW_PRIORITY.filter((k) => !upper.includes(k));
          return [...upper, ...rest];
        })();
        const activeKinds = localPriority.filter((k) => hasFlags[k]);

        if (hasExtra || hasImg || hasCombo) {
          const TOP_MARGIN = 8,
            BOTTOM_MARGIN = 8,
            ROW_GAP = 12;
          const usableH = vhC - TOP_MARGIN - BOTTOM_MARGIN;

          // anchor strictly to the ACTUAL rendered tooltip rect (already clamped to viewport)
          const mainR = tooltipEl.getBoundingClientRect();
          // pre-compute SOLO_MAX_H here so it's visible to both runLayout and
          // the img load listener (which runs outside runLayout's rAF closure).
          let SOLO_MAX_H = Math.max(80, mainR.bottom - mainR.top - 40);
          const colW = 320;
          const COL_GAP = 36;
          let colX, placedLeft;
          // prefer the same side the tooltip itself is on
          if (goRight) {
            colX = mainR.right + COL_GAP;
            placedLeft = false;
            if (colX + colW > vwC - 4) {
              colX = mainR.left - colW - COL_GAP;
              placedLeft = true;
            }
          } else {
            colX = mainR.left - colW - COL_GAP;
            placedLeft = true;
            if (colX < 4) {
              colX = mainR.right + COL_GAP;
              placedLeft = false;
            }
          }
          if (colX < 4) colX = 4;
          if (colX + colW > vwC - 4) colX = vwC - colW - 4;
          // align column top with the main tooltip's top, clamped to viewport
          let colTop = mainR.top;
          if (colTop < TOP_MARGIN) colTop = TOP_MARGIN;

          // populate content — supports static images AND mp4 (auto-looped, muted, no controls)
          // helper: create the right kind of media element (img or video) for a given src
          // Parse WxH from filename: name_1920_1080.mp4 → {w:1920, h:1080}
          // Returns null if no size hint found.
          function parseSizeHint(src) {
            const m = src.match(/_(\d{2,5})_(\d{2,5})(?:\.[^.]+)?(?:\?.*)?$/);
            if (!m) return null;
            const w = parseInt(m[1], 10),
              h = parseInt(m[2], 10);
            if (!w || !h) return null;
            return { w, h };
          }

          // Given a size hint and available container width/height, return the
          // pixel height the media will render at once loaded — used to pre-size
          // the container so the layout is stable before the file arrives.
          function hintedHeight(hint, containerW, maxH) {
            if (!hint) return null;
            const ratio = hint.h / hint.w;
            return Math.min(Math.round(containerW * ratio), maxH);
          }

          function makeMediaEl(src, promises, altText, audioOverride) {
            const isVideo = /\.mp4($|\?)/i.test(src);
            if (isVideo) {
              const vidEl = document.createElement('video');
              vidEl.src = src;
              vidEl.autoplay = true;
              vidEl.loop = true;
              vidEl.muted = true; // always starts muted; unmuted only via the speaker toggle below
              vidEl.playsInline = true;
              vidEl.controls = false;
              vidEl.disablePictureInPicture = true;
              vidEl.setAttribute(
                'controlsList',
                'nodownload nofullscreen noremoteplayback',
              );
              if (perkData?.fit !== false) vidEl.classList.add('fit-cover');
              promises.push(
                new Promise((resolve) => {
                  vidEl.addEventListener('loadeddata', resolve, { once: true });
                  vidEl.addEventListener('error', resolve, { once: true });
                }),
              );
              // once real dimensions are known, re-check overflow/scroll sizing
              // for whichever box this video ends up living in
              vidEl.addEventListener(
                'loadeddata',
                () => {
                  const box = vidEl.closest('#img-box, #img2-box, #extra-box');
                  if (box) {
                    const sel =
                      box.id === 'img2-box' ? '#img2-content' : '#img-content';
                    pinContentHeight(box, sel);
                  }
                },
                { once: true },
              );

              // per-image audio (in imgs[] entries) overrides the perk-level perkData.audio flag.
              // audioOverride === null means "not specified at this level" → fall back to perk-level.
              const wantsAudio =
                audioOverride !== null && audioOverride !== undefined
                  ? audioOverride
                  : perkData?.audio === true;

              if (wantsAudio) {
                const wrap = document.createElement('div');
                wrap.className = 'media-audio-wrap';
                wrap.appendChild(vidEl);

                const btn = document.createElement('button');
                btn.className = 'media-audio-btn';
                btn.title = 'Включить звук';
                btn.innerHTML = svgSpeakerIcon(true); // muted icon initially
                btn.addEventListener('click', (e) => {
                  e.stopPropagation();
                  vidEl.muted = !vidEl.muted;
                  btn.innerHTML = svgSpeakerIcon(vidEl.muted);
                  btn.title = vidEl.muted ? 'Включить звук' : 'Выключить звук';
                });
                wrap.appendChild(btn);
                return wrap;
              }

              return vidEl;
            } else {
              const imgEl = document.createElement('img');
              imgEl.alt = altText || perkData.name || '';
              promises.push(
                new Promise((resolve) => {
                  imgEl.addEventListener('load', resolve, { once: true });
                  imgEl.addEventListener('error', resolve, { once: true });
                }),
              );
              imgEl.addEventListener(
                'load',
                () => {
                  const box = imgEl.closest('#img-box, #img2-box');
                  if (!box) return;
                  const sel =
                    box.id === 'img2-box' ? '#img2-content' : '#img-content';
                  // release the explicit height we set during loading (when spinner was inside)
                  box.style.height = '';
                  // re-compute maxHeight from real natural dimensions
                  const w = imgEl.naturalWidth,
                    h = imgEl.naturalHeight;
                  if (w && h) {
                    const containerW = box.clientWidth - 20;
                    const wantsMax = imgSources.some(
                      (e) => e.height === 'maximum',
                    );
                    const cap = wantsMax ? SOLO_MAX_H : IMG_MAX_H;
                    const newH = Math.min(
                      Math.round((containerW * h) / w) + 36,
                      cap,
                    );
                    box.style.maxHeight = newH + 'px';
                  }
                  pinContentHeight(box, sel);
                },
                { once: true },
              );
              imgEl.src = src;
              return imgEl;
            }
          }

          // small speaker SVG, toggles between muted/unmuted glyph
          function svgSpeakerIcon(muted) {
            return muted
              ? `<svg viewBox="0 0 16 16" width="13" height="13">
                   <path d="M2 6h2.5L8 3v10L4.5 10H2z" fill="#c0bdb4"/>
                   <line x1="10.5" y1="6" x2="14" y2="9.5" stroke="#c0bdb4" stroke-width="1.3"/>
                   <line x1="14" y1="6" x2="10.5" y2="9.5" stroke="#c0bdb4" stroke-width="1.3"/>
                 </svg>`
              : `<svg viewBox="0 0 16 16" width="13" height="13">
                   <path d="M2 6h2.5L8 3v10L4.5 10H2z" fill="#e09040"/>
                   <path d="M10.5 5.5a3.2 3.2 0 0 1 0 5" fill="none" stroke="#e09040" stroke-width="1.2"/>
                   <path d="M12 4a5.4 5.4 0 0 1 0 8" fill="none" stroke="#e09040" stroke-width="1.1" opacity="0.7"/>
                 </svg>`;
          }

          const imgLoadPromises = [];
          let _sliderIndex = 0;

          function renderSliderImage(idx) {
            // explicitly stop any currently playing video before swapping content
            imgContent.querySelectorAll('video').forEach((v) => {
              v.pause();
              v.removeAttribute('src');
              v.load();
            });
            imgContent.innerHTML = '';
            const entry = imgSources[idx];
            const el = makeMediaEl(
              entry.src,
              imgLoadPromises,
              entry.title,
              entry.audio,
            );
            withLoadingSpinner(el, imgContent);
            imgHeader.textContent =
              entry.title || perkData.name || 'Иллюстрация';
            imgDots
              .querySelectorAll('.img-dot')
              .forEach((d, i) => d.classList.toggle('active', i === idx));
          }

          // helper: wraps a media element with a spinner that's visible until
          // the media actually finishes loading (load/loadeddata/error), then
          // removes itself. The spinner and the media element coexist in the
          // DOM the whole time — nothing overwrites innerHTML after this point,
          // so the spinner isn't wiped out before the browser gets to paint it.
          function withLoadingSpinner(mediaEl, container) {
            // sizeHint: {w, h} natural pixel dimensions of the media (from filename or known).
            // We insert an invisible placeholder div sized to the media's proportions so
            // the container immediately occupies the correct height — no layout jump after load.
            const spinnerWrap = document.createElement('div');
            spinnerWrap.className = 'media-loading-wrap';
            spinnerWrap.innerHTML = MEDIA_LOADING_SVG;

            container.appendChild(spinnerWrap);
            container.appendChild(mediaEl);

            const removeSpinner = () => spinnerWrap.remove();
            const tag = mediaEl.tagName;
            if (tag === 'IMG') {
              mediaEl.addEventListener('load', removeSpinner, { once: true });
              mediaEl.addEventListener('error', removeSpinner, { once: true });
              if (mediaEl.complete) removeSpinner(); // already cached/loaded
            } else if (tag === 'VIDEO') {
              mediaEl.addEventListener('loadeddata', removeSpinner, {
                once: true,
              });
              mediaEl.addEventListener('error', removeSpinner, { once: true });
            } else {
              // audio:true wraps the <video> in a .media-audio-wrap div
              const inner = mediaEl.querySelector('video');
              if (inner) {
                inner.addEventListener('loadeddata', removeSpinner, {
                  once: true,
                });
                inner.addEventListener('error', removeSpinner, { once: true });
              } else {
                removeSpinner();
              }
            }
          }

          if (hasImg) {
            if (useSlider) {
              // ONE window, multiple images, dot navigation
              _sliderIndex = 0;
              renderSliderImage(0);
              imgDots.innerHTML = imgSources
                .map(
                  (_, i) =>
                    `<span class="img-dot${i === 0 ? ' active' : ''}" data-idx="${i}"></span>`,
                )
                .join('');
              imgDots.classList.add('visible');
              imgDots.querySelectorAll('.img-dot').forEach((dot) => {
                dot.addEventListener('click', () => {
                  _sliderIndex = parseInt(dot.dataset.idx, 10);
                  renderSliderImage(_sliderIndex);
                });
              });
            } else {
              // single image (or first of imgs[] when useDualImg)
              const entry0 = imgSources[0];
              imgHeader.textContent =
                entry0.title || perkData.name || 'Иллюстрация';
              const el = makeMediaEl(
                entry0.src,
                imgLoadPromises,
                entry0.title,
                entry0.audio,
              );
              imgContent.innerHTML = '';
              withLoadingSpinner(el, imgContent);
            }
          }

          if (hasImg2) {
            const entry1 = imgSources[1];
            img2Header.textContent =
              entry1.title || perkData.name || 'Иллюстрация';
            const el2 = makeMediaEl(
              entry1.src,
              imgLoadPromises,
              entry1.title,
              entry1.audio,
            );
            img2Content.innerHTML = '';
            withLoadingSpinner(el2, img2Content);
          }
          if (hasExtra) {
            extraContent.innerHTML = renderMD(perkData.extra);
          }
          if (hasTip) {
            tipContent.innerHTML = renderMD(perkData.tip);
          }
          if (hasExtended) {
            const extData = lvlData.extended;
            const partnerId = Object.keys(extData).find(
              (k) => k !== 'title' && typeof extData[k] === 'object',
            );
            const partnerData = partnerId ? extData[partnerId] : extData;

            // resolve partner perk name + chapter colour (for the clickable square)
            let partnerName = partnerId || '';
            let partnerHex = '#585e72';
            let partnerSkill = null;
            if (partnerId) {
              for (const skill of D.skills) {
                const found = skill.perks.find((pp) => pp.id === partnerId);
                if (found) {
                  partnerName = found.name;
                  partnerSkill = skill;
                  break;
                }
              }
              if (partnerSkill) {
                const CM2 = {
                  orange: '#e09040',
                  red: '#cc3838',
                  blue: '#3e80d0',
                  green: '#28a860',
                  purple: '#7840c8',
                  yellow: '#b89030',
                  black: '#303030',
                  o: '#e09040',
                  r: '#cc3838',
                  b: '#3e80d0',
                  g: '#28a860',
                  p: '#7840c8',
                  y: '#b89030',
                  k: '#303030',
                };
                partnerHex =
                  CM2[(partnerSkill.color || '').toLowerCase()] || '#585e72';
              }
            }

            // header: icon + title
            const extTitle =
              extData.title ||
              partnerData.title ||
              partnerName ||
              '⚡ Расширенные способности';
            extendedHeader.innerHTML = partnerId
              ? `<span class="combo-sq ext-partner-sq" data-rid="${partnerId}"
                  style="display:inline-block;width:8px;height:8px;background:${partnerHex};
                  border-radius:1px;flex-shrink:0;cursor:pointer;margin-right:6px;
                  transition:box-shadow .2s;vertical-align:middle;"
                  onmouseenter="this.style.boxShadow='0 0 6px 3px ${partnerHex}88'"
                  onmouseleave="this.style.boxShadow=''"></span>${extTitle}`
              : extTitle;

            extendedContent.innerHTML = Object.entries(partnerData)
              .filter(([k]) => /^\d+$/.test(k))
              .map(([lvl, txt]) => {
                const col = LEVEL_COLOURS[parseInt(lvl)] || '#585e72';
                return `<div class="tt-row">
                  <span class="tt-lvl" style="color:${col}">${lvl}</span>
                  <span class="tt-text">${renderMD(txt)}</span>
                </div>`;
              })
              .join('');

            // click on square → focus partner perk (same as combo squares)
            if (partnerId) {
              extendedHeader
                .querySelector('.ext-partner-sq')
                ?.addEventListener('click', () => {
                  const allPerks = document.querySelectorAll('.perk');
                  let target = null;
                  for (const pe of allPerks) {
                    if (pe.dataset.perkId === partnerId) {
                      target = pe;
                      break;
                    }
                  }
                  if (!target) return;
                  hideTooltip();
                  target.scrollIntoView({
                    behavior: 'smooth',
                    block: 'center',
                  });
                  setTimeout(() => {
                    let fo = document.getElementById('focus-overlay');
                    if (!fo) {
                      fo = document.createElement('div');
                      fo.id = 'focus-overlay';
                      fo.style.cssText =
                        'position:fixed;inset:0;background:rgba(0,0,0,0);z-index:50;pointer-events:auto;transition:background .35s ease;';
                      document.body.appendChild(fo);
                    }
                    requestAnimationFrame(() => {
                      fo.style.background = `rgba(0,0,0,${FOCUS_DIM})`;
                    });
                    target.style.position = 'relative';
                    target.style.zIndex = '51';
                    target.style.transition = 'box-shadow .35s ease';
                    target.style.boxShadow = `0 0 0 2px ${partnerHex},0 0 30px ${partnerHex}80`;
                    function clearFocusExt() {
                      fo.style.background = 'rgba(0,0,0,0)';
                      target.style.boxShadow = '';
                      setTimeout(() => {
                        fo.remove();
                        target.style.position = '';
                        target.style.zIndex = '';
                        target.style.transition = '';
                      }, 350);
                    }
                    fo.addEventListener('click', clearFocusExt, { once: true });
                    setTimeout(() => {
                      window.addEventListener('scroll', clearFocusExt, {
                        once: true,
                        passive: true,
                      });
                      window.addEventListener('keydown', clearFocusExt, {
                        once: true,
                      });
                    }, 400);
                  }, 500);
                });
            }
          }
          if (hasCombo) {
            // resolve {name, colourHex} for any perk id, searching all chapters
            function resolvePerk(pid) {
              let pname = pid,
                pcol = 'o';
              for (const skill of D.skills) {
                const found = skill.perks.find((pp) => pp.id === pid);
                if (found) {
                  pname = found.name;
                  const CM = {
                    orange: 'o',
                    red: 'r',
                    blue: 'b',
                    green: 'g',
                    purple: 'p',
                    yellow: 'y',
                    black: 'k',
                    o: 'o',
                    r: 'r',
                    b: 'b',
                    g: 'g',
                    p: 'p',
                    y: 'y',
                    k: 'k',
                  };
                  pcol = skill.color
                    ? CM[skill.color.toLowerCase()] || skill.color[0]
                    : chapterColour.get(skill);
                  break;
                }
              }
              const hex =
                {
                  o: '#e09040',
                  r: '#cc3838',
                  b: '#3e80d0',
                  g: '#28a860',
                  p: '#7840c8',
                  y: '#b89030',
                  k: '#1a0000',
                }[pcol] || '#888';
              return { name: pname, hex };
            }

            // one combo-item row: a square+name+own-level for EACH dependent perk
            // (the combo key itself, plus any extras listed in info.perks as {lvl, perk}),
            // all sharing one description. Every row looks identical — no connectors.
            function renderComboRow(rows) {
              const rowsHtml = rows
                .map(({ pid, lvl }) => {
                  const { name, hex } = resolvePerk(pid);
                  return `<div class="combo-item-hdr" style="--combo-glow:0 0 6px 3px ${hex}88,0 0 14px 5px ${hex}44">
                  <span class="combo-sq" data-rid="${pid}"
                    style="display:inline-block;width:8px;height:8px;background:${hex};border-radius:1px;flex-shrink:0;cursor:pointer;transition:box-shadow .2s"
                    onmouseenter="this.style.boxShadow='0 0 6px 3px ${hex}88,0 0 14px 5px ${hex}44'"
                    onmouseleave="this.style.boxShadow=''"></span>
                  <span class="combo-item-name" data-rid="${pid}" style="cursor:pointer">${name}</span>
                  ${lvl ? `<span class="combo-item-lvl">от ур. ${lvl}</span>` : ''}
                </div>`;
                })
                .join('');
              const desc = renderMD(rows[0]?.desc || '');
              return `<div class="combo-item">${rowsHtml}<div class="combo-item-desc">${desc}</div></div>`;
            }

            comboLvls.innerHTML = Object.entries(combo)
              .map(([partnerId, info]) => {
                // info.perks (optional): [{ lvl, perk }, ...] — additional co-dependent perks,
                // each with its OWN required level. The combo key itself uses info.reqLvl.
                const extraRows = Array.isArray(info.perks)
                  ? info.perks
                      .filter((p) => p && p.perk)
                      .map((p) => ({ pid: p.perk, lvl: p.lvl }))
                  : [];
                const rows = [
                  { pid: partnerId, lvl: info.reqLvl, desc: info.desc },
                  ...extraRows,
                ];
                return renderComboRow(rows);
              })
              .join('');
          }

          // Layout runs IMMEDIATELY (no waiting on media at all) so every window,
          // including combo, appears with zero delay. If img/extra's box used the
          // spinner's tiny scrollHeight to size itself, runLayout() re-runs once
          // any media finishes loading AFTER the first pass, fixing the size
          // (and repositioning combo accordingly) without ever blocking first paint.
          function runLayout() {
            requestAnimationFrame(() =>
              requestAnimationFrame(() =>
                requestAnimationFrame(() => {
                  // ── SLOT-BASED LAYOUT ──
                  // Uses resolveSlots() + slotToPosition() to place every secondary
                  // window in a cell of the 3×2 grid around the levels tooltip.

                  // determine column index (0=left, 1=mid, 2=right)
                  const allColsLayout = document.querySelectorAll('.col');
                  const colsArr = Array.from(allColsLayout);
                  let colIdx = perkCol ? colsArr.indexOf(perkCol) : 1;
                  if (colIdx < 0) colIdx = 1;
                  colIdx = colIdx % 3;

                  // resolve slots using the pure function from step 3
                  const slotMap = resolveSlots(
                    activeKinds,
                    perkData?.positions || null,
                    colIdx,
                  );

                  // map kind → slot for easy lookup
                  const kindSlot = {};
                  slotMap.forEach(({ kind, slot }) => {
                    kindSlot[kind] = slot;
                  });

                  // box/svg/content-selector per kind
                  const BOX = {
                    IMG: imgBox,
                    EXTRA: extraBox,
                    TIP: tipBox,
                    EXTENDED: extendedBox,
                    COMBO: comboBox,
                  };
                  const SVG = {
                    IMG: imgArwSvg,
                    EXTRA: extraSvg,
                    TIP: tipSvg,
                    EXTENDED: extendedSvg,
                    COMBO: comboSvg,
                  };
                  const CONTENT_SEL = {
                    IMG: '#img-content',
                    EXTRA: '#extra-content',
                    TIP: '#tip-content',
                    EXTENDED: '#extended-content',
                    COMBO: null, // combo manages its own internal scroll
                  };

                  // track placed rects for arrow-line anchoring
                  const placedRects = {}; // kind → DOMRect

                  // ── place each window ──
                  // pre-compute which top-row slots have NO bottom-row partner —
                  // those windows get to expand to near-mainR height instead of slotH.
                  const occupiedSlots = new Set(slotMap.map((e) => e.slot));
                  function hasBottomPartner(slot) {
                    const side = slot.charAt(0); // 'L' or 'R'
                    return occupiedSlots.has(side + 'B');
                  }

                  for (const { kind, slot } of slotMap) {
                    const box = BOX[kind];
                    const svg = SVG[kind];
                    const contentSel = CONTENT_SEL[kind];
                    if (!box) continue;

                    const pos = slotToPosition(slot, mainR, vwC, vhC);
                    const isTopRow = slot.endsWith('T');
                    const isSolo = isTopRow && !hasBottomPartner(slot);

                    box.style.left = pos.x + 'px';
                    box.style.top = pos.y + 'px';
                    box.style.width = pos.w + 'px';

                    const isMediaKind = kind === 'IMG';

                    // check if any source requests 'maximum' height
                    const wantsMaximum =
                      kind === 'IMG' &&
                      imgSources.some((e) => e.height === 'maximum');

                    // cap: 'maximum' = SOLO_MAX_H (ignores IMG_MAX_H),
                    //       solo        = min(SOLO_MAX_H, IMG_MAX_H),
                    //       normal      = min(pos.h, IMG_MAX_H)
                    const cap = wantsMaximum
                      ? SOLO_MAX_H
                      : isSolo
                        ? Math.min(SOLO_MAX_H, IMG_MAX_H)
                        : isMediaKind
                          ? Math.min(pos.h, IMG_MAX_H)
                          : pos.h;

                    let effectiveH = cap;

                    // filename size hint: always try to use proportional height,
                    // regardless of 'maximum' — the cap already sets the ceiling.
                    if (kind === 'IMG' && imgSources.length) {
                      const firstSrc = imgSources[0]?.src || '';
                      const hint = parseSizeHint(firstSrc);
                      const containerW = pos.w - 20; // minus padding
                      const hinted = hintedHeight(hint, containerW, cap);
                      if (hinted) effectiveH = Math.min(hinted + 36, cap); // +36 for header
                    }
                    box.style.maxHeight = effectiveH + 'px';
                    // IMG boxes need explicit height so the box doesn't collapse to
                    // spinner height while waiting for media — maxHeight alone won't
                    // stretch a flex box, only cap it.
                    box.style.height = isMediaKind ? effectiveH + 'px' : '';
                    box.style.minHeight = '';
                    box.style.display = 'flex';

                    // For IMG: don't call pinContentHeight on first pass — the DOM
                    // contains only a spinner (26px), which would make pinContentHeight
                    // set content.height=26px, overriding the correct effectiveH.
                    // The load listener in makeMediaEl calls it once real dimensions known.
                    if (contentSel && kind !== 'IMG')
                      pinContentHeight(box, contentSel);

                    const rect = box.getBoundingClientRect();
                    placedRects[kind] = rect;

                    // ── connector line ──
                    // Top-row windows (LT/MT/RT): connect horizontally from mainR
                    //   using the "Stylish" style (icX anchor, no vertical doubling).
                    // Bottom-row windows (LB/MB/RB): connect from the window above
                    //   them in the same column (vertical L-shape via drawLine).
                    const isTop = slot.endsWith('T');
                    const sameSide = slot.charAt(0); // 'L' or 'R'

                    if (isTop) {
                      // "Stylish" connector: right-side windows (RT) align at mainR.top,
                      // left-side windows (LT) drop 40px below mainR.top so the two
                      // horizontal lines visibly start at different heights on the same
                      // vertical connector — the original "Stylish left" look.
                      const STYLISH_OFFSET =
                        pos.side === 'left' && colIdx === 1 ? 40 : 0;
                      if (STYLISH_OFFSET) {
                        // reposition the box itself to match the offset
                        box.style.top = pos.y + STYLISH_OFFSET + 'px';
                        // use effectiveH (already accounts for isSolo), not pos.h
                        box.style.maxHeight =
                          Math.max(80, effectiveH - STYLISH_OFFSET) + 'px';

                        if (contentSel) pinContentHeight(box, contentSel);
                        // re-measure
                        const r2 = box.getBoundingClientRect();
                        placedRects[kind] = r2;
                      }
                      const finalRect = placedRects[kind];
                      if (pos.side === 'right') {
                        // RT: use drawLine (single polyline) so the join with the
                        // vertical icon→tooltip connector renders as one clean path,
                        // no sub-pixel stitch artifact at the meeting point.
                        drawLine(svg, mainR, finalRect, false);
                      } else {
                        // LT (Stylish left): horizontal line from icX
                        const R2 = Math.round;
                        const lineY = R2(finalRect.top + 18);
                        const fromX = R2(icX);
                        const toX = R2(finalRect.right);
                        const len = Math.abs(toX - fromX);
                        svg.style.cssText =
                          `display:block;position:fixed;left:0;top:0;` +
                          `width:${vwC}px;height:${vhC}px;pointer-events:none;z-index:499;overflow:visible;`;
                        svg.setAttribute('viewBox', `0 0 ${vwC} ${vhC}`);
                        svg.innerHTML = `<line x1="${fromX}" y1="${lineY}" x2="${toX}" y2="${lineY}"
                        stroke="#50556a" stroke-width="1.5"
                        stroke-dasharray="${len}" stroke-dashoffset="${len}"
                        style="animation:dashIn .4s ease forwards"/>`;
                      }
                    } else {
                      // bottom-row: position this box right below the ACTUAL bottom of
                      // the top-row window (not at a fixed grid offset), keeping the
                      // gap tight regardless of how tall the top content is.
                      const topSlot = sameSide + 'T';
                      const topKind = slotMap.find(
                        (e) => e.slot === topSlot,
                      )?.kind;
                      const anchorRect = topKind ? placedRects[topKind] : mainR;

                      // reposition this box immediately below anchorRect
                      const actualY = Math.round(
                        anchorRect.bottom + SLOT_ROW_GAP,
                      );
                      const maxH = Math.max(80, vhC - actualY - 8);
                      box.style.top = actualY + 'px';
                      box.style.maxHeight = maxH + 'px';
                      if (contentSel) pinContentHeight(box, contentSel);

                      // re-measure after repositioning
                      const finalRect = box.getBoundingClientRect();
                      placedRects[kind] = finalRect;

                      // short vertical stub
                      const R2 = Math.round;
                      const lx = R2(anchorRect.left + 20);
                      const ly1 = R2(anchorRect.bottom);
                      const ly2 = R2(finalRect.top);
                      const llen = Math.max(1, Math.abs(ly2 - ly1));
                      svg.style.cssText =
                        `display:block;position:fixed;left:0;top:0;` +
                        `width:${vwC}px;height:${vhC}px;pointer-events:none;z-index:499;overflow:visible;`;
                      svg.setAttribute('viewBox', `0 0 ${vwC} ${vhC}`);
                      svg.innerHTML = `<line x1="${lx}" y1="${ly1}" x2="${lx}" y2="${ly2}"
                      stroke="#50556a" stroke-width="1.5"
                      stroke-dasharray="${llen}" stroke-dashoffset="${llen}"
                      style="animation:dashIn .4s ease forwards"/>`;
                    }
                  }

                  // ── IMG special: media, slider, pinContentHeight already done above ──
                  // Re-run pinContentHeight for IMG after media might have loaded
                  if (placedRects['IMG']) {
                    pinContentHeight(imgBox, '#img-content');
                  }

                  // ── IMG2: second image window (imgs[] with slider:false) ──
                  // img2 is not in WINDOW_PRIORITY — it always goes right below IMG.
                  if (hasImg2 && placedRects['IMG']) {
                    const imgRectForImg2 = placedRects['IMG'];
                    const i2w = SLOT_COL_W;
                    img2Box.style.display = 'flex';
                    img2Box.style.width = i2w + 'px';
                    img2Box.style.left = imgRectForImg2.left + 'px';
                    const i2y = Math.round(
                      imgRectForImg2.bottom + SLOT_ROW_GAP,
                    );
                    const i2maxH = Math.max(80, vhC - i2y - 8);
                    img2Box.style.top = i2y + 'px';
                    img2Box.style.maxHeight = i2maxH + 'px';
                    pinContentHeight(img2Box, '#img2-content');
                    const img2Rect = img2Box.getBoundingClientRect();
                    // short vertical connector from img bottom to img2 top
                    const R2 = Math.round;
                    const lx = R2(imgRectForImg2.left + 20);
                    const ly1 = R2(imgRectForImg2.bottom);
                    const ly2 = R2(img2Rect.top);
                    const llen = Math.max(1, Math.abs(ly2 - ly1));
                    img2ArwSvg.style.cssText =
                      `display:block;position:fixed;left:0;top:0;` +
                      `width:${vwC}px;height:${vhC}px;pointer-events:none;z-index:499;overflow:visible;`;
                    img2ArwSvg.setAttribute('viewBox', `0 0 ${vwC} ${vhC}`);
                    img2ArwSvg.innerHTML = `<line x1="${lx}" y1="${ly1}" x2="${lx}" y2="${ly2}"
                    stroke="#50556a" stroke-width="1.5"
                    stroke-dasharray="${llen}" stroke-dashoffset="${llen}"
                    style="animation:dashIn .4s ease forwards"/>`;
                  }

                  // ── COMBO: attach click handlers for focus-jump ──
                  if (placedRects['COMBO']) {
                    comboLvls
                      .querySelectorAll('.combo-sq, .combo-item-name')
                      .forEach((sq) => {
                        sq.addEventListener('click', () => {
                          const rid = sq.dataset.rid;
                          const allPerks = document.querySelectorAll('.perk');
                          let target = null;
                          for (const pe of allPerks) {
                            if (pe.dataset.perkId === rid) {
                              target = pe;
                              break;
                            }
                          }
                          if (!target) return;
                          hideTooltip();
                          target.scrollIntoView({
                            behavior: 'smooth',
                            block: 'center',
                          });
                          setTimeout(() => {
                            let fo = document.getElementById('focus-overlay');
                            if (!fo) {
                              fo = document.createElement('div');
                              fo.id = 'focus-overlay';
                              fo.style.cssText =
                                'position:fixed;inset:0;background:rgba(0,0,0,0);z-index:50;pointer-events:auto;transition:background .35s ease;';
                              document.body.appendChild(fo);
                            }
                            requestAnimationFrame(() => {
                              fo.style.background = `rgba(0,0,0,${FOCUS_DIM})`;
                            });
                            target.style.position = 'relative';
                            target.style.zIndex = '51';
                            target.style.transition = 'box-shadow .35s ease';
                            const _ic = target.querySelector('.perk-icon');
                            const _cm = {
                              'ic-o': '#e09040',
                              'ic-r': '#cc3838',
                              'ic-b': '#3e80d0',
                              'ic-g': '#28a860',
                              'ic-p': '#7840c8',
                              'ic-y': '#b89030',
                              'ic-k': '#1a0000',
                            };
                            const _hex =
                              Object.entries(_cm).find(
                                ([k]) => _ic && _ic.classList.contains(k),
                              )?.[1] || '#e09040';
                            target.style.boxShadow = `0 0 0 2px ${_hex},0 0 30px ${_hex}80`;
                            function clearFocus() {
                              fo.style.background = 'rgba(0,0,0,0)';
                              target.style.boxShadow = '';
                              window.removeEventListener('scroll', clearFocus, {
                                passive: true,
                              });
                              window.removeEventListener('click', clearFocus);
                              window.removeEventListener('keydown', clearFocus);
                              setTimeout(() => {
                                fo.remove();
                                target.style.position = '';
                                target.style.zIndex = '';
                                target.style.transition = '';
                              }, 350);
                            }
                            fo.addEventListener('click', clearFocus);
                            setTimeout(() => {
                              window.addEventListener('scroll', clearFocus, {
                                once: true,
                                passive: true,
                              });
                              window.addEventListener('keydown', clearFocus, {
                                once: true,
                              });
                            }, 400);
                          }, 500);
                        });
                      });
                  }
                }),
              ),
            );
          } // end runLayout

          runLayout(); // run immediately — no waiting on media load
          // if media loads AFTER this first pass (slow network), re-run layout
          // once so the box resizes from spinner-height to its real size and
          // combo/extra reposition accordingly. Cheap no-op if already sized right.
          if (imgLoadPromises.length) {
            Promise.all(imgLoadPromises).then(() =>
              requestAnimationFrame(() => requestAnimationFrame(runLayout)),
            );
          }
        }

        // draw L-line — terminates at the NEAR edge of the tooltip, never runs underneath it
        const ttHeaderMidY = y + 18;
        const toX = goRight ? x : x + tw; // near edge: left edge if goRight, right edge if not
        const cornerY = ttHeaderMidY;
        const vLen = Math.abs(icY - cornerY);
        const hLen = Math.abs(toX - icX);
        const total = vLen + hLen;

        ttArrowSvg.style.cssText = `display:block;position:fixed;left:0;top:0;width:${vw}px;height:${vh}px;pointer-events:none;z-index:499;overflow:visible;`;
        ttArrowSvg.setAttribute('viewBox', `0 0 ${vw} ${vh}`);
        ttArrowSvg.innerHTML = `
    <circle cx="${icX}" cy="${icY}" r="3" fill="#50556a"/>
    <polyline points="${icX},${icY} ${icX},${cornerY} ${toX},${cornerY}"
      fill="none" stroke="#50556a" stroke-width="1.5"
      stroke-dasharray="${total}" stroke-dashoffset="${total}"
      style="animation:dashIn .3s ease forwards"/>`;
      }

      function hideTooltip() {
        if (!_isVisible) return;
        _isVisible = false;
        tooltipEl.style.display = 'none';
        tooltipEl.style.maxHeight = '';
        tooltipEl.style.opacity = '0';
        ttOverlay.style.display = 'none';
        ttOverlay.style.background = 'rgba(0,0,0,0)';
        ttArrowSvg.style.display = 'none';
        ttArrowSvg.innerHTML = '';
        document.getElementById('extra-box').style.display = 'none';
        document.getElementById('extra-arrow-svg').style.display = 'none';
        document.getElementById('tip-box').style.display = 'none';
        document.getElementById('tip-arrow-svg').style.display = 'none';
        document.getElementById('extended-box').style.display = 'none';
        document.getElementById('extended-arrow-svg').style.display = 'none';
        document.getElementById('img-box').style.display = 'none';
        document.getElementById('img-arrow-svg').style.display = 'none';
        document.getElementById('img-dots').classList.remove('visible');
        document.getElementById('img2-box').style.display = 'none';
        document.getElementById('img2-arrow-svg').style.display = 'none';
        // stop any playing video so audio doesn't keep going in the background
        document
          .querySelectorAll('#img-content video, #img2-content video')
          .forEach((v) => {
            v.pause();
            v.removeAttribute('src');
            v.load();
          });
        document.getElementById('combo-box').style.display = 'none';
        document.getElementById('combo-arrow-svg').style.display = 'none';
        document.body.style.overflow = '';
        if (_currentBtn) {
          _currentBtn.classList.remove('glowing');
          _currentBtn = null;
        }
      }

      // close on Escape key
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') hideTooltip();
      });
      // close on click outside tooltip
      ttOverlay.addEventListener('click', hideTooltip);

      // ── SVG CONNECTOR DRAWING ──
      function svgLine(x1, y1, x2, y2, stroke, sw = 1.5) {
        const l = document.createElementNS(
          'http://www.w3.org/2000/svg',
          'line',
        );
        l.setAttribute('x1', x1);
        l.setAttribute('y1', y1);
        l.setAttribute('x2', x2);
        l.setAttribute('y2', y2);
        l.setAttribute('stroke', stroke);
        l.setAttribute('stroke-width', sw);
        return l;
      }
      function svgArrowRight(svg, x, y, fill) {
        const p = document.createElementNS(
          'http://www.w3.org/2000/svg',
          'polygon',
        );
        p.setAttribute(
          'points',
          `${x},${y} ${x - 5},${y - 3} ${x - 5},${y + 3}`,
        );
        p.setAttribute('fill', fill);
        svg.appendChild(p);
      }
      function svgArrowDown(svg, x, y, fill) {
        const p = document.createElementNS(
          'http://www.w3.org/2000/svg',
          'polygon',
        );
        p.setAttribute(
          'points',
          `${x},${y} ${x - 4},${y - 7} ${x + 4},${y - 7}`,
        );
        p.setAttribute('fill', fill);
        svg.appendChild(p);
      }

      function relTop(el, ancestor) {
        let t = 0,
          cur = el;
        while (cur && cur !== ancestor) {
          t += cur.offsetTop;
          cur = cur.offsetParent;
        }
        return t;
      }

      function drawColumn({ connEl, connSvg, contentEl, chRefs, spineSvg }) {
        const CONN = 22;
        const mx = CONN / 2;

        // measure everything relative to connEl (same top as contentEl since they are flex siblings)
        const base = connEl.getBoundingClientRect().top;

        function yOf(el, offset) {
          const r = el.getBoundingClientRect();
          return r.top - base + offset;
        }
        function midOf(el) {
          return yOf(el, el.offsetHeight / 2);
        }
        function iconOf(el) {
          return yOf(el, 15);
        }

        // collect targets
        const targets = [];
        chRefs.forEach(({ hdr, pw, c }) => {
          targets.push({ y: midOf(hdr), isHdr: true, c });
          pw.querySelectorAll('.perk').forEach((p) => {
            targets.push({ y: iconOf(p), isHdr: false, c });
          });
        });
        if (!targets.length) return;

        // total svg height = bottom of last target + small padding
        const svgH = targets[targets.length - 1].y + 20;
        connEl.style.height = svgH + 'px';
        connSvg.innerHTML = '';
        connSvg.setAttribute('viewBox', `0 0 ${CONN} ${svgH}`);

        // 1. grey gap segments between chapters (drawn first = behind)
        for (let i = 0; i < chRefs.length - 1; i++) {
          const lastPerk = Array.from(
            chRefs[i].pw.querySelectorAll('.perk'),
          ).pop();
          const nextHdr = chRefs[i + 1].hdr;
          if (!lastPerk || !nextHdr) continue;
          connSvg.appendChild(
            svgLine(mx, iconOf(lastPerk), mx, midOf(nextHdr), '#50556a'),
          );
        }

        // 2. coloured vertical spine within each chapter (drawn second = in front of grey)
        chRefs.forEach(({ hdr, pw, c }) => {
          const col = COL_HEX[c] || SPINE;
          const perks = Array.from(pw.querySelectorAll('.perk'));
          const spineT = midOf(hdr);
          const spineB = perks.length
            ? iconOf(perks[perks.length - 1])
            : spineT;
          connSvg.appendChild(svgLine(mx, spineT, mx, spineB, col));
        });

        // 3. branches + arrowheads (drawn last = on top)
        targets.forEach(({ y, isHdr, c }) => {
          const col = COL_HEX[c] || SPINE;
          connSvg.appendChild(svgLine(mx, y, isHdr ? CONN : CONN - 3, y, col));
          if (!isHdr) svgArrowRight(connSvg, CONN + 1, y, col);
        });
      }

      function drawTopBus() {
        const old = document.getElementById('top-bus-svg');
        if (old) old.remove();

        const mainArea = document.getElementById('main-area');
        const titleBox = document.getElementById('title-box');
        const anBox2 = document.getElementById('altnames-box');
        const spacer = document.getElementById('bus-spacer');
        const colsRowEl = document.getElementById('cols-row');
        if (!mainArea || !titleBox || !spacer || !colsRowEl) return;
        mainArea.style.position = 'relative';

        // All coords relative to mainArea using offsetLeft/offsetTop
        function off(el) {
          let l = 0,
            t = 0,
            cur = el;
          while (cur && cur !== mainArea) {
            l += cur.offsetLeft;
            t += cur.offsetTop;
            cur = cur.offsetParent;
          }
          return {
            left: l,
            top: t,
            right: l + el.offsetWidth,
            bottom: t + el.offsetHeight,
            w: el.offsetWidth,
            h: el.offsetHeight,
          };
        }

        const tb = off(titleBox);
        const an = off(anBox2);
        const sp = off(spacer);

        const busY = sp.top + sp.h / 2;
        const src1X = tb.left + tb.w / 2;
        const src1Y = tb.bottom;
        const src2X = an.left + an.w / 2;
        const src2Y = an.bottom;

        // target Xs: mid of first ch-hdr in each col
        const txs = [],
          hdrTops = [];
        colsRowEl.querySelectorAll('.col').forEach((col) => {
          const hdr = col.querySelector('.ch-hdr');
          if (!hdr) return;
          const r = off(hdr);
          txs.push(r.left + r.w / 2);
          hdrTops.push(r.top);
        });
        if (!txs.length) return;

        const W = mainArea.offsetWidth;
        const H = (hdrTops[0] || sp.bottom) + 10;

        const svg = document.createElementNS(
          'http://www.w3.org/2000/svg',
          'svg',
        );
        svg.id = 'top-bus-svg';
        svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
        svg.style.cssText = `position:absolute;left:0;top:0;width:${W}px;height:${H}px;pointer-events:none;overflow:visible;z-index:5;`;

        const S = '#50556a';
        const ln = (x1, y1, x2, y2) => {
          const l = svgLine(x1, y1, x2, y2, S);
          svg.appendChild(l);
        };

        ln(src1X, src1Y, src1X, busY);
        ln(src2X, src2Y, src2X, busY);
        const allXs = [src1X, src2X, ...txs];
        ln(Math.min(...allXs), busY, Math.max(...allXs), busY);
        txs.forEach((tx, i) => {
          const hTop = hdrTops[i] ?? busY;
          ln(tx, busY, tx, hTop - 7);
          svgArrowDown(svg, tx, hTop, S);
        });

        mainArea.appendChild(svg);
      }
      // ── SPECTRE TOOLTIP ──
      const spTooltip = document.getElementById('sp-tooltip');
      const spOverlay = document.getElementById('sp-overlay');
      const spHeader = document.getElementById('sp-header');
      const spLevels = document.getElementById('sp-levels');
      let _spectreOpen = false;

      const COLOUR_KEYS = {
        red: '#cc3838',
        orange: '#e09040',
        yellow: '#b89030',
        blue: '#3e80d0',
        green: '#28a860',
        purple: '#7840c8',
        black: '#282827',
      };

      function showSpectre(iconEl) {
        if (!D.spectre) return;
        _spectreOpen = true;
        document.body.style.overflow = 'hidden';

        spHeader.textContent = 'Палитра цветов';
        spLevels.innerHTML = Object.entries(D.spectre)
          .map(([colour, txt]) => {
            const hex = COLOUR_KEYS[colour] || '#888';
            return `<div class="tt-row">
      <span style="display:inline-block;width:10px;height:10px;background:${hex};border-radius:1px;flex-shrink:0;margin-top:2px"></span>
      <span class="tt-text">${txt}</span>
    </div>`;
          })
          .join('');

        spTooltip.style.display = 'flex';
        spTooltip.style.opacity = '1';
        const ir = iconEl.getBoundingClientRect();
        const icX = ir.left + ir.width / 2;
        const icY = ir.top + ir.height / 2;
        const tw = 340,
          vh = window.innerHeight,
          vw = window.innerWidth;
        const goRight = icX + 16 + tw <= vw - 4;
        let x = goRight ? icX + 16 : icX - tw - 16;
        if (x < 4) x = 4;
        spTooltip.style.maxHeight = Math.floor(vh * 0.82) + 'px';
        const actualH = Math.min(spTooltip.scrollHeight, Math.floor(vh * 0.82));
        let y = icY - actualH / 2;
        if (y + actualH > vh - 8) y = vh - actualH - 8;
        if (y < 8) y = 8;
        spTooltip.style.left = x + 'px';
        spTooltip.style.top = y + 'px';

        spOverlay.style.display = 'block';
        spOverlay.style.background = 'rgba(0,0,0,.6)';
        spOverlay.addEventListener('click', hideSpectre);

        // draw L-line from icon to sp-tooltip header
        const ttHeaderMidY = y + 18;
        const toX = goRight ? x : x + tw;
        const vLen = Math.abs(icY - ttHeaderMidY);
        const hLen = Math.abs(toX - icX);
        const total = vLen + hLen;
        const vw2 = vw;
        const vh2 = vh;

        ttArrowSvg.style.cssText = `display:block;position:fixed;left:0;top:0;width:${vw2}px;height:${vh2}px;pointer-events:none;z-index:499;overflow:visible;`;
        ttArrowSvg.setAttribute('viewBox', `0 0 ${vw2} ${vh2}`);
        ttArrowSvg.innerHTML = `
    <circle cx="${icX}" cy="${icY}" r="3" fill="#50556a"/>
    <polyline points="${icX},${icY} ${icX},${ttHeaderMidY} ${toX},${ttHeaderMidY}"
      fill="none" stroke="#50556a" stroke-width="1.5"
      stroke-dasharray="${total}" stroke-dashoffset="${total}"
      style="animation:dashIn .3s ease forwards"/>`;
      }

      function hideSpectre() {
        _spectreOpen = false;
        spTooltip.style.display = 'none';
        spOverlay.style.display = 'none';
        spOverlay.style.background = '';
        document.body.style.overflow = '';
        const cascSvg2 = document.getElementById('casc-arrow-svg');
        if (cascSvg2) cascSvg2.style.display = 'none';
        // also clear main arrow SVG (used for title-box spectre line)
        ttArrowSvg.style.display = 'none';
        ttArrowSvg.innerHTML = '';
        const titleIcon = document.querySelector('#title-name span');
        if (titleIcon) titleIcon.style.boxShadow = '';
      }
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          hideTooltip();
          hideSpectre();
        }
      });

      // ── DRAW ──
      function redrawAll() {
        colRefs.forEach(drawColumn);
        drawTopBus();
      }

      window.addEventListener('resize', () => requestAnimationFrame(redrawAll));
      document.fonts.ready.then(() =>
        requestAnimationFrame(() =>
          requestAnimationFrame(() => {
            redrawAll();
            // initial layout is complete — hide the global page loader
            const pageLoader = document.getElementById('page-loader');
            if (pageLoader) pageLoader.classList.add('hidden');
          }),
        ),
      );

      // ── PNG EXPORT ──
      async function exportPNG() {
        const st = document.getElementById('exp-st');
        st.textContent = 'Загрузка…';
        const s = document.createElement('script');
        s.src = 'libs/html2canvas.min.js';
        document.head.appendChild(s);
        await new Promise((res, rej) => {
          s.onload = res;
          s.onerror = rej;
        });
        st.textContent = 'Рендеринг…';
        const root = document.getElementById('export-root');
        const cv = await html2canvas(root, {
          backgroundColor: '#0c0d14',
          scale: 2,
          useCORS: true,
          logging: false,
          windowWidth: root.scrollWidth,
          width: root.scrollWidth,
        });
        const a = document.createElement('a');
        a.download = `${D.tabName}_perks.png`;
        a.href = cv.toDataURL('image/png');
        a.click();
        st.textContent = '✓';
        setTimeout(() => {
          st.textContent = '';
        }, 3000);
      }
      // ── DOCUMENTATION MODAL ──
      // Tabs and their source files are declared here. Add/remove entries to
      // change what shows up in the modal — tabs, panes, and fetch calls are
      // all generated from this list, nothing else needs editing.
      const MODAL = [
        { title: 'Лицензия', src: 'LICENSE' },
        { title: 'Обновления', src: 'CHANGELOG' },
      ];

      const licenseToolbar = document.getElementById('license-toolbar');
      const licenseOverlay = document.getElementById('license-overlay');
      const licenseModal = document.getElementById('license-modal');
      const licenseTabsEl = document.getElementById('license-tabs');
      const licensePanesEl = document.getElementById('license-panes');
      const licenseDownload = document.getElementById('license-download');

      // build tabs + panes once, from MODAL
      const _modalState = MODAL.map((entry, i) => ({
        ...entry,
        loaded: false,
        rawText: '',
      }));

      licenseTabsEl.innerHTML = _modalState
        .map(
          (m, i) =>
            `<button class="license-tab${i === 0 ? ' active' : ''}" data-idx="${i}">${m.title}</button>`,
        )
        .join('');

      licensePanesEl.innerHTML = _modalState
        .map(
          (m, i) =>
            `<div class="license-pane${i === 0 ? ' active' : ''}" id="license-pane-${i}">Загрузка…</div>`,
        )
        .join('');

      const licenseTabs = licenseTabsEl.querySelectorAll('.license-tab');

      async function loadModalTab(idx) {
        const m = _modalState[idx];
        const pane = document.getElementById('license-pane-' + idx);
        if (m.loaded) return;
        try {
          const res = await fetch(m.src);
          if (!res.ok) throw new Error('not found');
          const text = await res.text();
          m.rawText = text;
          pane.innerHTML =
            typeof marked !== 'undefined'
              ? marked.parse(text)
              : text.replace(/\n/g, '<br>');
          m.loaded = true;
        } catch (e) {
          pane.textContent = `Не удалось загрузить файл ${m.src}.\nУбедитесь, что он лежит рядом с этой страницей в той же папке/репозитории.`;
        }
      }

      function switchModalTab(idx) {
        licenseTabs.forEach((t, i) => t.classList.toggle('active', i === idx));
        _modalState.forEach((m, i) => {
          document
            .getElementById('license-pane-' + i)
            .classList.toggle('active', i === idx);
        });
        const m = _modalState[idx];
        licenseDownload.href = m.loaded
          ? URL.createObjectURL(new Blob([m.rawText], { type: 'text/plain' }))
          : '#';
        licenseDownload.download = m.src;
        loadModalTab(idx);
      }

      licenseTabs.forEach((tab, i) => {
        tab.addEventListener('click', () => switchModalTab(i));
      });

      function showLicense() {
        licenseModal.classList.add('visible');
        licenseOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
        switchModalTab(0); // always open on the first tab
      }
      function hideLicense() {
        licenseModal.classList.remove('visible');
        licenseOverlay.classList.remove('active');
        document.body.style.overflow = '';
      }

      licenseToolbar.addEventListener('click', showLicense);
      licenseOverlay.addEventListener('click', hideLicense);
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') hideLicense();
      });
    </script>
  </body>
</html>
