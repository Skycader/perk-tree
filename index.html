    />
    <script src="libs/marked.min.js"></script>
    <link href="libs/css2.css" rel="stylesheet" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #080910;
        font-family: 'JetBrains Mono', monospace;
        color: #c0bdb4;
      }

      /* ── CUSTOM SCROLLBAR ── */
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #1e2235;
        border-radius: 2px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #2e3448;
      }
      * {
        scrollbar-width: thin;
        scrollbar-color: #1e2235 transparent;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 200;
        background: linear-gradient(
          90deg,
          #0a0b13 0%,
          #0c0d18 50%,
          #0a0b13 100%
        );
        border-bottom: 1px solid #1e2235;
        box-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
        height: 46px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
      }
      .tb-left {
        display: flex;
        align-items: baseline;
        gap: 12px;
      }
      .tb-title {
        font-family: 'JetBrains Mono', monospace;
        font-size: 18px;
        font-weight: 700;
        color: #e09040;
        letter-spacing: 0.1em;
      }
      .tb-sub {
        font-size: 10px;
        color: #454a60;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      .tb-stats {
        display: flex;
        gap: 16px;
        align-items: center;
      }
      .tb-stat {
        font-size: 11px;
        color: #585e72;
      }
      .tb-stat span {
        color: #c0bdb4;
        font-weight: 500;
      }
      .tb-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 5px 14px;
        border: 1px solid #2a3050;
        background: rgba(224, 144, 64, 0.07);
        color: #e09040;
        cursor: pointer;
        transition: all 0.15s;
        font-family: inherit;
      }
      .btn:hover {
        background: rgba(224, 144, 64, 0.16);
        border-color: #e09040;
      }
      .tb-app-version {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        color: #454a60;
        letter-spacing: 0.04em;
        margin-right: 4px;
      }

      #exp-st {
        font-size: 10px;
        color: #454a60;
        margin-right: 4px;
      }

      .page {
        display: flex;
        gap: 16px;
        padding: 16px;
        align-items: flex-start;
      }
      .main-area {
        display: flex;
        flex-direction: column;
        gap: 0;
        flex: 1;
        min-width: 0;
        position: relative;
      }

      /* meta row */
      .meta-row {
        display: flex;
        gap: 8px;
      }
      .title-box {
        position: relative;
        flex-shrink: 0;
        width: 175px;
        border: 1px solid rgba(200, 120, 48, 0.5);
        background: linear-gradient(
          135deg,
          rgba(200, 120, 48, 0.18) 0%,
          rgba(200, 120, 48, 0.06) 100%
        );
        box-shadow:
          0 4px 20px rgba(200, 120, 48, 0.15),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        padding: 10px 12px;
      }
      .title-box-version {
        position: absolute;
        right: 8px;
        bottom: 6px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 8px;
        color: rgba(224, 144, 64, 0.5);
        letter-spacing: 0.03em;
      }
      .title-box-name {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 16px;
        color: #e09040;
        letter-spacing: 0.08em;
      }
      .title-box-sub {
        font-size: 9px;
        color: #585e72;
        letter-spacing: 0.05em;
        margin-top: 3px;
      }
      .altnames-box {
        flex: 1;
        border: 1px solid #1e2235;
        background: linear-gradient(
          135deg,
          #13151f 0%,
          #111320 60%,
          #0f1019 100%
        );
        box-shadow:
          0 2px 12px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.03);
        padding: 10px 12px;
      }
      .altnames-label {
        font-size: 9px;
        color: #585e72;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        margin-bottom: 7px;
      }
      .altnames-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }
      .an-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 10px;
        color: #7a8090;
        background: #0f1018;
        border: 1px solid #1e2235;
        border-radius: 3px;
        padding: 2px 8px 2px 6px;
      }
      .an-tag::before {
        content: '';
        display: block;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #3a4560;
        flex-shrink: 0;
      }

      /* spacer + cols */
      .cols-row {
        display: flex;
        gap: 0;
        align-items: flex-start;
        width: 100%;
      }

      .col {
        --CONN: 22px;
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: row;
        margin-right: 20px;
        position: relative;
        align-self: flex-start;
      }
      .col:last-child {
        margin-right: 0;
      }

      .col-connector {
        width: var(--CONN);
        flex-shrink: 0;
        position: relative;
        align-self: flex-start;
      }
      .col-connector svg {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: visible;
        pointer-events: none;
      }
      .col-spine {
        position: absolute;
        left: 0;
        top: 0;
        width: var(--CONN);
        height: 100%;
        pointer-events: none;
        overflow: hidden;
        z-index: 0;
      }
      .col-connector {
        position: relative;
        z-index: 2;
        isolation: isolate;
      }

      .col-content {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-self: flex-start;
      }

      /* chapter */
      .chapter {
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .ch-hdr {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px;
        margin-bottom: 5px;
        border: 1px solid;
        flex-shrink: 0;
      }
      .ch-hdr .ch-num {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        font-weight: 500;
        color: #585e72;
        min-width: 16px;
      }
      .ch-hdr .ch-name {
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.05em;
        word-break: break-word;
      }

      .hc-o {
        background: linear-gradient(
          120deg,
          rgba(200, 120, 48, 0.18) 0%,
          rgba(200, 120, 48, 0.07) 100%
        );
        border-color: rgba(200, 120, 48, 0.5);
        box-shadow:
          0 2px 12px rgba(200, 120, 48, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      .hc-o .ch-name {
        color: #e8a050;
      }
      .hc-r {
        background: linear-gradient(
          120deg,
          rgba(160, 40, 40, 0.18) 0%,
          rgba(160, 40, 40, 0.07) 100%
        );
        border-color: rgba(160, 40, 40, 0.5);
        box-shadow:
          0 2px 12px rgba(160, 40, 40, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      .hc-r .ch-name {
        color: #d84040;
      }
      .hc-b {
        background: linear-gradient(
          120deg,
          rgba(40, 96, 168, 0.18) 0%,
          rgba(40, 96, 168, 0.07) 100%
        );
        border-color: rgba(40, 96, 168, 0.5);
        box-shadow:
          0 2px 12px rgba(40, 96, 168, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      .hc-b .ch-name {
        color: #4a90e0;
      }
      .hc-g {
        background: linear-gradient(
          120deg,
          rgba(32, 136, 80, 0.18) 0%,
          rgba(32, 136, 80, 0.07) 100%
        );
        border-color: rgba(32, 136, 80, 0.5);
        box-shadow:
          0 2px 12px rgba(32, 136, 80, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      .hc-g .ch-name {
        color: #30b868;
      }
      .hc-p {
        background: linear-gradient(
          120deg,
          rgba(96, 48, 168, 0.18) 0%,
          rgba(96, 48, 168, 0.07) 100%
        );
        border-color: rgba(96, 48, 168, 0.5);
        box-shadow:
          0 2px 12px rgba(96, 48, 168, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      .hc-p .ch-name {
        color: #8850d8;
      }
      .hc-y {
        background: linear-gradient(
          120deg,
          rgba(144, 120, 32, 0.18) 0%,
          rgba(144, 120, 32, 0.07) 100%
        );
        border-color: rgba(144, 120, 32, 0.5);
        box-shadow:
          0 2px 12px rgba(144, 120, 32, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      .hc-y .ch-name {
        color: #c8a038;
      }
      .hc-k {
        background: linear-gradient(
          120deg,
          rgba(60, 60, 60, 0.18) 0%,
          rgba(40, 40, 40, 0.07) 100%
        );
        border-color: rgba(100, 100, 100, 0.45);
        box-shadow:
          0 2px 12px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      .hc-k .ch-name {
        color: #909090;
      }

      .perks-wrap {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .perk {
        background: linear-gradient(
          135deg,
          #13151f 0%,
          #111320 50%,
          #0f1019 100%
        );
        border: 1px solid #1c1f2e;
        box-shadow:
          0 2px 8px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.03);
        padding: 7px 10px 8px;
        display: flex;
        gap: 8px;
        align-items: flex-start;
        transition:
          background 0.15s,
          box-shadow 0.15s;
        cursor: default;
        position: relative;
      }
      .perk:hover {
        background: linear-gradient(
          135deg,
          #181a28 0%,
          #151728 50%,
          #121524 100%
        );
        box-shadow:
          0 4px 16px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }
      .perk-icon {
        width: 10px;
        height: 10px;
        flex-shrink: 0;
        margin-top: 3px;
        border-radius: 1px;
      }
      .perk-body {
        flex: 1;
        min-width: 0;
        overflow: hidden;
      }
      .perk-name {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 600;
        font-size: 12px;
        color: #dedad2;
        line-height: 1.35;
        word-break: break-word;
      }
      .perk-desc {
        font-size: 10px;
        color: #585e72;
        line-height: 1.5;
        margin-top: 2px;
        word-break: break-word;
        white-space: pre-line;
      }

      .ic-o {
        background: #e09040;
      }
      .ic-r {
        background: #cc3838;
      }
      .ic-b {
        background: #3e80d0;
      }
      .ic-g {
        background: #28a860;
      }
      .ic-p {
        background: #7840c8;
      }
      .ic-y {
        background: #b89030;
      }
      .ic-k {
        background: #505050;
      }

      .perk-icon {
        transition: box-shadow 0.25s ease;
      }

      /* ── CHAIN DEPENDENCY ── */
      .perk-name-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .perk-chain {
        display: inline-flex;
        align-items: center;
        width: 13px;
        height: 13px;
        flex-shrink: 0;
        opacity: 0.4;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .perk-chain:hover {
        opacity: 1;
      }
      .perk-chain-tip {
        display: none;
        position: fixed;
        z-index: 600;
        background: #0d0e18;
        border: 1px solid #2a3050;
        padding: 8px 12px;
        font-size: 10px;
        color: #8090a0;
        pointer-events: auto;
        max-width: 240px;
        line-height: 1.6;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
      }
      .perk-chain-tip strong {
        display: block;
        color: #c0bdb4;
        margin-bottom: 6px;
        font-size: 10px;
        letter-spacing: 0.05em;
      }
      .perk-chain-dep {
        display: flex;
        align-items: center;
        gap: 7px;
        margin-top: 4px;
        cursor: pointer;
        padding: 2px 0;
        border-radius: 2px;
        transition: color 0.15s;
      }
      .perk-chain-dep:hover {
        color: #c0bdb4;
      }
      .perk-icon.glowing.ic-o {
        box-shadow:
          0 0 6px 3px rgba(224, 144, 64, 0.9),
          0 0 18px 7px rgba(224, 144, 64, 0.35);
      }
      .perk-icon.glowing.ic-r {
        box-shadow:
          0 0 6px 3px rgba(204, 56, 56, 0.9),
          0 0 18px 7px rgba(204, 56, 56, 0.35);
      }
      .perk-icon.glowing.ic-b {
        box-shadow:
          0 0 6px 3px rgba(62, 128, 208, 0.9),
          0 0 18px 7px rgba(62, 128, 208, 0.35);
      }
      .perk-icon.glowing.ic-g {
        box-shadow:
          0 0 6px 3px rgba(40, 168, 96, 0.9),
          0 0 18px 7px rgba(40, 168, 96, 0.35);
      }
      .perk-icon.glowing.ic-p {
        box-shadow:
          0 0 6px 3px rgba(120, 64, 200, 0.9),
          0 0 18px 7px rgba(120, 64, 200, 0.35);
      }
      .perk-icon.glowing.ic-y {
        box-shadow:
          0 0 6px 3px rgba(184, 144, 48, 0.9),
          0 0 18px 7px rgba(184, 144, 48, 0.35);
      }
      .perk-icon.glowing.ic-k {
        box-shadow:
          0 0 6px 3px rgba(120, 120, 120, 0.9),
          0 0 18px 7px rgba(120, 120, 120, 0.35);
      }

      /* sidebar */
      .sidebar {
        width: 210px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .sb-hdr {
        padding: 8px 10px;
        margin-bottom: 5px;
        background: linear-gradient(
          120deg,
          rgba(200, 120, 48, 0.18) 0%,
          rgba(200, 120, 48, 0.07) 100%
        );
        border: 1px solid rgba(200, 120, 48, 0.45);
        box-shadow:
          0 2px 12px rgba(200, 120, 48, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        font-weight: 600;
        color: #e09040;
        letter-spacing: 0.06em;
      }
      .rtable-wrap {
        border: 1px solid #1c1f2e;
      }
      .rtable {
        width: 100%;
        border-collapse: collapse;
      }
      .rtable th {
        font-size: 9px;
        color: #585e72;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        padding: 4px 8px;
        border-bottom: 1px solid #1c1f2e;
        text-align: left;
        background: #0e0f16;
      }
      .rtable td {
        padding: 3px 8px;
        border-bottom: 1px solid rgba(28, 31, 46, 0.5);
        vertical-align: middle;
      }
      .rtable tr:last-child td {
        border-bottom: none;
      }
      .rtable tr:nth-child(odd) td {
        background: #12141e;
      }
      .rtable tr:nth-child(even) td {
        background: #0f1019;
      }
      .r-lvl {
        font-size: 10px;
        color: #585e72;
        white-space: nowrap;
      }
      .r-name {
        font-size: 11px;
        color: #dedad2;
        font-weight: 500;
      }
      .badge {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .badge-row {
        display: flex;
        gap: 2px;
      }
      .sq {
        width: 7px;
        height: 7px;
        border-radius: 1px;
        display: inline-block;
      }
      .sq-w {
        background: #999;
        outline: 1px solid #666;
      }
      .sq-y {
        background: #a87818;
      }
      .sq-r {
        background: #902020;
      }
      .sq-b {
        background: #164890;
      }
      .sq-k {
        background: #1e1e1e;
        outline: 1px solid #363636;
      }

      /* bottom bar */
      .bottom-bar {
        margin: 16px;
      }
      .bb-hdr {
        padding: 6px 12px;
        background: rgba(180, 140, 30, 0.07);
        border: 1px solid rgba(180, 140, 30, 0.22);
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        font-weight: 600;
        color: #b89030;
        letter-spacing: 0.08em;
      }
      .bb-items {
        display: flex;
      }
      .bb-item {
        flex: 1;
        border: 1px solid #1c1f2e;
        border-top: none;
        background: #12141e;
        padding: 8px 12px;
      }
      .bb-item + .bb-item {
        border-left: none;
      }
      .bb-item-name {
        font-size: 11px;
        font-weight: 500;
        color: #cc3030;
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .bb-item-name::before {
        content: '';
        display: inline-block;
        width: 8px;
        height: 8px;
        background: #a02828;
        border-radius: 1px;
        flex-shrink: 0;
      }

        overflow-x: hidden;

      .media-loading-wrap {

    <script>
      // ── BACKGROUND (GRID::RUNNER sky only) ──
      (function () {
        const cv = document.getElementById('bg-canvas');
        const cx = cv.getContext('2d');
        let T = 0,
          lightnings = [];
        function resize() {
          cv.width = innerWidth;
          cv.height = innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        function lcg(seed) {
          let s = seed >>> 0;
          return () => {
            s = (1664525 * s + 1013904223) >>> 0;
            return s / 4294967296;
          };
        }
        const rnd = lcg(0xcafe1234);
        // stars in polar coords — all rotate at same speed (celestial sphere)
        const ROT_SPEED = 0.008; // rad/s
        const STARS = Array.from({ length: 160 }, () => ({
          r: 0.05 + rnd() * 0.78,
          ang: rnd() * Math.PI * 2,
          sz: rnd() < 0.14 ? 1.5 : 1,
          ph: rnd() * Math.PI * 2,
          tw: 0.28 + rnd() * 0.48,
        }));
        function drawBg(t) {
          const W = cv.width,
            H = cv.height;
          const cx0 = W / 2,
            cy0 = H / 2;
          const diag = Math.sqrt(cx0 * cx0 + cy0 * cy0) * 1.05;
          const sky = cx.createLinearGradient(0, 0, 0, H);
          sky.addColorStop(0, '#000005');
          sky.addColorStop(0.5, '#000a10');
          sky.addColorStop(1, '#001420');
          cx.fillStyle = sky;
          cx.fillRect(0, 0, W, H);
          // all stars rotate together around screen centre
          cx.save();
          cx.translate(cx0, cy0);
          cx.rotate(t * ROT_SPEED);
          STARS.forEach((s) => {
            const x = Math.cos(s.ang) * s.r * diag;
            const y = Math.sin(s.ang) * s.r * diag;
            const fl = 0.3 + 0.7 * Math.abs(Math.sin(t * s.tw + s.ph));
            cx.fillStyle = `rgba(160,220,255,${fl * 0.55})`;
            cx.fillRect(x, y, s.sz, s.sz);
          });
          cx.restore();
          // lightning
          if (Math.random() < 0.0038) lightnings.push(mkLightning(W, H));
          cx.save();
          lightnings = lightnings.filter((l) => l.a > 0.01);
          lightnings.forEach((l) => {
            l.a -= l.dk;
            drawLP(l.pts, 1.4, l.a * 0.88);
            l.br.forEach((b) => drawLP(b, 0.65, l.a * 0.36));
            if (l.a > 0.65) {
              cx.fillStyle = `rgba(100,170,255,${(l.a - 0.65) * 0.07})`;
              cx.fillRect(0, 0, W, H);
            }
          });
          cx.restore();
        }
        function mkLightning(W, H) {
          const x = rnd() * W,
            y0 = rnd() * H * 0.3,
            y1 = y0 + 50 + rnd() * 120;
          const pts = [{ x, y: y0 }];
          let cx2 = x,
            cy = y0;
          while (cy < y1) {
            cy += 7 + rnd() * 13;
            cx2 += (rnd() - 0.5) * 33;
            pts.push({ x: cx2, y: cy });
          }
          const br = [];
          if (pts.length > 2 && rnd() > 0.52) {
            const bi = Math.floor(pts.length * 0.4);
            let bx = pts[bi].x,
              by = pts[bi].y;
            const bp = [{ x: bx, y: by }];
            for (let i = 0; i < 3 + Math.floor(rnd() * 4); i++) {
              by += 5 + rnd() * 9;
              bx += (rnd() - 0.5) * 23;
              bp.push({ x: bx, y: by });
            }
            br.push(bp);
          }
          return { pts, br, a: 1, dk: 0.046 + rnd() * 0.05 };
        }
        function drawLP(pts, w, a) {
          if (pts.length < 2) return;
          cx.beginPath();
          cx.moveTo(pts[0].x, pts[0].y);
          for (let i = 1; i < pts.length; i++) cx.lineTo(pts[i].x, pts[i].y);
          cx.strokeStyle = `rgba(160,212,255,${a})`;
          cx.lineWidth = w;
          cx.shadowBlur = 10;
          cx.shadowColor = '#55aaff';
          cx.stroke();
          cx.shadowBlur = 0;
        }
        function loop(ts) {
          T = ts / 1000;
          resize();
          drawBg(T);
          requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
      })();
      // ── COLOUR CYCLE for chapters ──
      const COLOURS = [
        'o',
        'b',
        'o',
        'p',
        'o',
        'r',
        'g',
        'r',
        'b',
        'r',
        'b',
        'y',
        'b',
        'g',
        'g',
        'y',
        'y',
        'p',
        'o',
      ];
      const COL_HEX = {
        o: '#c87830',
        r: '#a02828',
        b: '#2860a8',
        g: '#208850',
        p: '#6030a8',
        y: '#907820',
        k: '#303030',
      };
      const SPINE = '#2e3448';
      const FOCUS_DIM = 0.75; // затемнение фона при фокусе (0–1)

      // Дефолтный порядок вторичных окон тултипа. Каждое окно получает
      // СЛОТ (1, 2, 3...) — либо явный из perkData.positions, либо
      // следующий свободный по этому порядку. Слот НЕ считает основное
      // окно уровней — слот 1 это первое доп. окно, слот 2 под ним,
      // слот 3 это новый столбик (рядом со слотом 1), и т.д.
      const WINDOW_PRIORITY = ['IMG', 'EXTRA', 'TIP', 'COMBO', 'EXTENDED'];

      // ── TOOLTIP HEIGHT LIMITS ──
      // maxH = min(vh * PERCENT, PX_CAP) so the tooltip never exceeds either bound.
      // Raise PX_CAP to remove the hard pixel ceiling (e.g. set to Infinity).
      const MAX_TOOLTIP_HEIGHT_PERCENT = 0.8; // fraction of viewport height
      const MAX_TOOLTIP_HEIGHT_PX = 600; // hard pixel cap (set to Infinity to disable)

      // Какой столбик сетки 3×2 занимает окно уровней, в зависимости от
      // колонки дерева (0=левая, 1=средняя, 2=правая).
      // Остальные 4 слота свободны для вторичных окон.
      // Сетка: LT MT RT / LB MB RB
      const LEVELS_COL = { 0: 'L', 1: 'M', 2: 'R' };

      // Дефолтный порядок заполнения свободных слотов (зигзаг) по колонке.
      const DEFAULT_SLOT_ORDER = {
        0: ['RT', 'RB', 'MT', 'MB'], // левая: уровни=L, зигзаг вправо потом середина
        1: ['RT', 'RB', 'LT', 'LB'], // средняя: уровни=M, сначала вправо потом влево
        2: ['LT', 'LB', 'MT', 'MB'], // правая: уровни=R, зигзаг влево потом середина
      };

      // Зарезервированные слоты (занятые окном уровней) — вторичные окна
      // не могут их занять, попытка даёт console.warn.
      const RESERVED_SLOTS = {
        0: ['LT', 'LB'],
        1: ['MT', 'MB'],
        2: ['RT', 'RB'],
      };

      // ── SLOT RESOLVER ──
      // Pure function — no DOM access. Takes:
      //   activeKinds : string[]           — список активных типов окон (из WINDOW_PRIORITY)
      //   positions   : object|null        — perkData.positions, e.g. {combo:'RT', extra:'LT'}
      //   colIndex    : 0|1|2             — колонка дерева где находится перк
      // Returns: [{kind, slot}] sorted by slot fill order, plus warnings[].
      function resolveSlots(activeKinds, positions, colIndex) {
        const reserved = RESERVED_SLOTS[colIndex] || [];
        const defaultOrder = DEFAULT_SLOT_ORDER[colIndex] || [
          'RT',
          'RB',
          'LT',
          'LB',
        ];
        const warnings = [];

        // 1. collect explicit slot assignments from positions{}
        const explicit = {}; // slot → kind
        const explicitKind = {}; // kind → slot
        if (positions) {
          for (const [kind, slot] of Object.entries(positions)) {
            if (
              !activeKinds.includes(kind.toUpperCase()) &&
              !activeKinds.includes(kind)
            )
              continue;
            const normalKind = kind.toUpperCase();
            const normalSlot = slot?.toUpperCase?.() || slot;
            if (reserved.includes(normalSlot)) {
              warnings.push(
                `[Древо] positions.${kind}='${slot}' конфликтует с окном уровней ` +
                  `(слот ${normalSlot} занят в колонке ${colIndex}). Позиция проигнорирована.`,
              );
              continue;
            }
            if (explicit[normalSlot]) {
              warnings.push(
                `[Древо] positions.${kind}='${slot}' — слот ${normalSlot} уже занят ` +
                  `окном ${explicit[normalSlot]}. Позиция проигнорирована.`,
              );
              continue;
            }
            explicit[normalSlot] = normalKind;
            explicitKind[normalKind] = normalSlot;
          }
        }

        // 2. assign remaining kinds to next free slots in defaultOrder
        let freeIdx = 0;
        const result = [];
        for (const kind of activeKinds) {
          if (explicitKind[kind]) {
            result.push({ kind, slot: explicitKind[kind] });
          } else {
            // advance to next free slot
            while (
              freeIdx < defaultOrder.length &&
              (explicit[defaultOrder[freeIdx]] ||
                reserved.includes(defaultOrder[freeIdx]))
            )
              freeIdx++;
            if (freeIdx < defaultOrder.length) {
              result.push({ kind, slot: defaultOrder[freeIdx] });
              explicit[defaultOrder[freeIdx]] = kind;
              freeIdx++;
            } else {
              warnings.push(
                `[Древо] Нет свободных слотов для окна ${kind} — оно не будет показано.`,
              );
            }
          }
        }

        // 3. emit all warnings
        warnings.forEach((w) => console.warn(w));

        // 4. sort by slot order (explicit first respects defaultOrder sequence)
        const slotRank = Object.fromEntries(defaultOrder.map((s, i) => [s, i]));
        result.sort(
          (a, b) => (slotRank[a.slot] ?? 99) - (slotRank[b.slot] ?? 99),
        );

        return result;
      }

      const MEDIA_LOADING_SVG = `<svg class="media-loading-svg" viewBox="0 0 24 24">

      // Resolve a perk id → {name, hex} for inline <perk> tags.
      function resolvePerkInline(pid) {
        const COLOR_HEX = {
          o: '#e09040',
          r: '#cc3838',
          b: '#3e80d0',
          g: '#28a860',
          p: '#7840c8',
          y: '#b89030',
          k: '#303030',

          red: '#cc3838',
          blue: '#3e80d0',

          black: '#303030',

        for (const skill of typeof D !== 'undefined' ? D.skills : []) {
          const found = skill.perks.find((pp) => pp.id === pid);
          if (found) {
            const hex = COLOR_HEX[(skill.color || '').toLowerCase()] || '#888';
            return { name: found.name, hex };

        return { name: pid, hex: '#888' };

      // Lightweight MD renderer for level description rows — avoids wrapping
      // everything in <p> blocks which inflate scrollHeight and break layout.
      // Uses parseInline for simple text, full parse only when block MD detected.
      function renderLevelMD(text) {
        if (!text) return '';
        const preprocessed = text
          .replace(/<line-break\s*\/?>(<\/line-break>)?/gi, '<br>')
          .replace(
            /<empty-line\s*\/?>(<\/empty-line>)?/gi,
            '<span class="md-blank-line"></span>',
          );
        const hasBlock = /^\s*(#{1,6} |[*\-+] |\d+\. |>|\|.*\|)/m.test(
          preprocessed,
        );
        let html;
        if (typeof marked !== 'undefined') {
          html = hasBlock
            ? marked.parse(preprocessed)
            : marked.parseInline(preprocessed);
        } else {
          html = preprocessed.replace(/\n/g, '<br>');
        }
        return processPerkTags(html);
      }

      function renderMD(text) {
        if (!text) return '';
        // normalise explicit line-break tags and \n before markdown parsing
        let preprocessed = text
          .replace(/<line-break\s*\/?>(<\/line-break>)?/gi, '  \n') // → MD hard break
          .replace(
            /<empty-line\s*\/?>(<\/empty-line>)?/gi,
            '<span class="md-blank-line"></span>',
          )
          .replace(/\\n/g, '  \n'); // literal \n in config strings → MD hard break
        let html;
        if (typeof marked !== 'undefined') {
          html = marked.parse(preprocessed);
        } else {
          html = preprocessed.replace(/\n/g, '<br>');
        }
        return processPerkTags(html);
      }

      // ── SLOT → PHYSICAL POSITION ──
      // Pure function — no DOM access. Converts a slot name (LT/LB/MT/MB/RT/RB)
      // into pixel coordinates {x, y, w, h, side} for a secondary window box,
      // given the main tooltip rect (mainR) and viewport dimensions.
      //
      // Layout model:
      //   - The 3×2 grid is virtual — actual pixel positions are calculated
      //     relative to mainR (the levels tooltip rect).
      //   - Each column of the grid is COL_W wide; columns are separated by COL_GAP.
      //   - Top row (LT/MT/RT) starts at mainR.top.
      //   - Bottom row (LB/MB/RB) starts at mainR.top + slotH + ROW_GAP.
      //   - slotH = half of usable vertical space, so two rows fit cleanly.
      //   - 'side' tells the caller whether the window is left or right of mainR
      //     (used to decide which edge to connect the arrow line to).
      //
      // Returns: { x, y, w, h, side:'left'|'right' }
      // x/y are the top-left corner of the box in viewport px.

      const SLOT_COL_W = 320; // width of each secondary window
      const SLOT_COL_GAP = 36; // horizontal gap between columns (and from mainR)
      const SLOT_ROW_GAP = 16; // vertical gap between top and bottom rows
      const IMG_MAX_H = 420; // maximum height of img/img2 content box (px)

      function slotToPosition(slot, mainR, vwC, vhC) {
        const usableH = vhC - mainR.top - 8;
        const slotH = Math.max(80, Math.floor((usableH - SLOT_ROW_GAP) / 2));
        const isTop = slot.endsWith('T');
        const colLetter = slot.charAt(0); // 'L', 'M', 'R'

        const y = isTop ? mainR.top : mainR.top + slotH + SLOT_ROW_GAP;
        const h = slotH;

        // Grid layout relative to mainR (the levels tooltip):
        //   R = first column to the right  (mainR.right + GAP)
        //   L = first column to the left   (mainR.left  - GAP - W)
        //   M = SECOND column — direction depends on which tree column the perk is in.
        //       For left/mid perk columns  → M is the second column to the RIGHT of R
        //       For right perk column      → M is the second column to the LEFT of L
        //   This is determined at call-time by the caller passing colIdx via closure,
        //   but slotToPosition is pure — so we infer direction from existing geometry:
        //   if R slot fits to the right, M goes further right; else M goes left.
        let x, side;
        const rightX = mainR.right + SLOT_COL_GAP;
        const leftX = mainR.left - SLOT_COL_GAP - SLOT_COL_W;
        const right2X = mainR.right + SLOT_COL_GAP * 2 + SLOT_COL_W; // 2nd col right
        const left2X = mainR.left - SLOT_COL_GAP * 2 - SLOT_COL_W * 2; // 2nd col left

        if (colLetter === 'R') {
          x = rightX;
          side = 'right';
        } else if (colLetter === 'L') {
          x = leftX;
          side = 'left';
        } else {
          // M = second column in the primary direction
          // Primary direction: if right side has more room use right, else left
          const rightRoom = vwC - right2X - SLOT_COL_W - 4;
          if (rightRoom >= 0) {
            x = right2X;
            side = 'right';
          } else {
            x = left2X;
            side = 'left';
          }
        }

        if (x < 4) x = 4;
        if (x + SLOT_COL_W > vwC - 4) x = vwC - SLOT_COL_W - 4;

        return { x, y, w: SLOT_COL_W, h, side };
      }

      // ── DISTRIBUTE chapters into 3 columns (balance by perk count) ──
      function distributeToColumns(skills, nCols) {

            // chain dependency icon

              let _chainHide = null;

                  const tw = tip.offsetWidth,
                    th = tip.offsetHeight;
                  const vw = window.innerWidth,
                    vh = window.innerHeight;
                  let tx = r.left - tw - 8;
                  if (tx < 4) tx = r.right + 8;
                  let ty = r.top - th / 2 + 7;
                  if (ty < 4) ty = 4;
                  if (ty + th > vh - 4) ty = vh - th - 4;
                  tip.style.left = tx + 'px';
                  tip.style.top = ty + 'px';

                  // draw L-line from chain icon centre → tip header
                  const icX = r.left + r.width / 2;
                  const icY = r.top + r.height / 2;
                  const tipR = tip.getBoundingClientRect();
                  const goRight = tx > icX;
                  const toX = goRight ? tipR.left : tipR.right;
                  const toY = tipR.top + 18;
                  const cornerY = toY;
                  const vLen = Math.abs(icY - cornerY);
                  const hLen = Math.abs(toX - icX);
                  const total = vLen + hLen;
                  ttArrowSvg.style.cssText = `display:block;position:fixed;left:0;top:0;width:${vw}px;height:${vh}px;pointer-events:none;z-index:499;overflow:visible;`;

                  ttArrowSvg.innerHTML = `

                      stroke-dasharray="${total}" stroke-dashoffset="${total}"
                      style="animation:dashIn .3s ease forwards"/>`;

              }
              function hideTipDelayed() {
                _chainHide = setTimeout(() => {
                  tip.style.display = 'none';

              }
              chainSvg.addEventListener('mouseenter', showTip);
              chainSvg.addEventListener('mouseleave', hideTipDelayed);
              tip.addEventListener('mouseenter', () =>
                clearTimeout(_chainHide),

              tip.addEventListener('mouseleave', () => {
                tip.style.display = 'none';

              // click chain icon or dep item → scroll to & highlight target perk
              function focusPerk(rid) {
                tip.style.display = 'none';

                if (!target) return;
                // scroll first, then highlight after scroll settles
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setTimeout(() => {
                  // create full-screen focus overlay with fade-in
                  let fo = document.getElementById('focus-overlay');
                  if (!fo) {
                    fo = document.createElement('div');
                    fo.id = 'focus-overlay';
                    fo.style.cssText =
                      'position:fixed;inset:0;background:rgba(0,0,0,0);z-index:50;pointer-events:auto;transition:background .35s ease;';
                    document.body.appendChild(fo);
                  }
                  // fade in
                  requestAnimationFrame(() => {
                    fo.style.background = `rgba(0,0,0,${FOCUS_DIM})`;
                  });
                  // lift target above overlay
                  target.style.position = 'relative';
                  target.style.zIndex = '51';
                  // get chapter colour from perk icon class
                  const _ic1 = target.querySelector('.perk-icon');
                  const _cm1 = {
                    'ic-o': '#e09040',
                    'ic-r': '#cc3838',
                    'ic-b': '#3e80d0',
                    'ic-g': '#28a860',
                    'ic-p': '#7840c8',
                    'ic-y': '#b89030',
                  };
                  const _hex1 =
                    Object.entries(_cm1).find(
                      ([k]) => _ic1 && _ic1.classList.contains(k),
                    )?.[1] || '#e09040';
                  const _hex1a = _hex1 + '80';
                  target.style.transition = 'box-shadow .35s ease';
                  target.style.boxShadow = `0 0 0 2px ${_hex1}, 0 0 30px ${_hex1a}`;

                  function clearFocus() {
                    fo.style.background = 'rgba(0,0,0,0)';

                    window.removeEventListener('scroll', clearFocus, {

                    setTimeout(() => {

      // ── SIDEBAR: ranks with dynamic level ranges ──
      function makeBadge(badgeStr) {
        // badgeStr uses emoji squares — map to css sq classes
        const out = [];
        const lines = badgeStr.split('\n');
        for (const line of lines) {
          const chars = [...line]; // handle emoji properly
          const row = chars
            .map((ch) => {
              if (ch === '◽' || ch === '⬜' || ch === '◻')
                return `<span class="sq sq-w"></span>`;
              if (ch === '🟨') return `<span class="sq sq-y"></span>`;
              if (ch === '🟥') return `<span class="sq sq-r"></span>`;
              if (ch === '🟦') return `<span class="sq sq-b"></span>`;
              if (ch === '⬛' || ch === '◼')
                return `<span class="sq sq-k"></span>`;
              return '';
            })
            .join('');
          if (row) out.push(`<div class="badge-row">${row}</div>`);
        }
        return `<div class="badge">${out.join('')}</div>`;

      const sb = document.getElementById('sidebar');

      sb.innerHTML = `

      // ── BOTTOM BAR vulnerabilities — from D.vulns if present ──
      const vulns = D.vulns || [];

        ? `<div class="bb-hdr">⚜ Уязвимости ${standName}</div>

      // ── TOOLTIP LOGIC ──
      const LEVEL_COLOURS = [
        '#585e72',
        '#4a7a50',
        '#4a7a50',
        '#5a7a30',
        '#5a7a30',
        '#7a7020',

        '#7a5020',

        '#904030',

      const ttArrowSvg = document.getElementById('tt-arrow-svg');
      const ttOverlay = document.getElementById('tt-overlay');
      let _currentBtn = null;
      let _isVisible = false;
      let _comboPerkId = null;

      function showTooltip(name, lvlDesc, iconEl) {
        _currentBtn = iconEl;
        _isVisible = true;
        _comboPerkId = iconEl.closest('.perk')?.dataset?.perkId || null;
        document.body.style.overflow = 'hidden';

        document.querySelectorAll('.perk-icon.glowing').forEach((el) => {

        // coloured square in header
        const _perkEl2 = _currentBtn?.closest('.perk');
        const _perkIc2 = _perkEl2?.querySelector('.perk-icon');
        const _icHexMap = {
          'ic-o': '#e09040',
          'ic-r': '#cc3838',
          'ic-b': '#3e80d0',
          'ic-g': '#28a860',
          'ic-p': '#7840c8',
          'ic-y': '#b89030',
          'ic-k': '#505050',
        };
        const _icCls2 = Object.keys(_icHexMap).find((cl) =>
          _perkIc2?.classList.contains(cl),
        );
        const _icHex2 = _icHexMap[_icCls2] || '#888';
        const _sqSpan = document.createElement('span');
        _sqSpan.style.cssText = `display:inline-block;width:10px;height:10px;background:${_icHex2};border-radius:1px;margin-right:8px;vertical-align:middle;cursor:pointer;flex-shrink:0;transition:box-shadow .2s`;
        _sqSpan.addEventListener('mouseenter', () => {
          _sqSpan.style.boxShadow = `0 0 6px 3px ${_icHex2}aa,0 0 14px 5px ${_icHex2}44`;
        });
        _sqSpan.addEventListener('mouseleave', () => {
          _sqSpan.style.boxShadow = '';
        });
        _sqSpan.addEventListener('click', () => {
          if (!D.spectre) return;
          // show spectre anchored to this square
          _spectreOpen = true;
          spHeader.textContent = 'Палитра цветов';
          spLevels.innerHTML = Object.entries(D.spectre)
            .map(([colour, txt]) => {
              const hex = COLOUR_KEYS[colour] || '#888';
              return `<div class="tt-row"><span style="display:inline-block;width:10px;height:10px;background:${hex};border-radius:1px;flex-shrink:0;margin-top:2px"></span><span class="tt-text">${txt}</span></div>`;
            })
            .join('');
          spTooltip.style.display = 'flex';
          spTooltip.style.opacity = '1';
          const sr = _sqSpan.getBoundingClientRect();
          const tw = 340,
            vh2 = window.innerHeight,
            vw2 = window.innerWidth;
          spTooltip.style.maxHeight = Math.floor(vh2 * 0.82) + 'px';
          const sh = Math.min(spTooltip.scrollHeight, Math.floor(vh2 * 0.82));
          let sx = sr.right + 12;
          if (sx + tw > vw2 - 4) sx = sr.left - tw - 12;
          if (sx < 4) sx = 4;
          let sy = sr.top - sh / 2;
          if (sy + sh > vh2 - 8) sy = vh2 - sh - 8;
          if (sy < 8) sy = 8;
          spTooltip.style.left = sx + 'px';
          spTooltip.style.top = sy + 'px';
          // no extra overlay for cascade — reuse existing tt-overlay
          // draw L-line with circle from square to sp-tooltip header
          requestAnimationFrame(() => {
            const sqR = _sqSpan.getBoundingClientRect();
            const spR = spTooltip.getBoundingClientRect();
            const vwA = window.innerWidth,
              vhA = window.innerHeight;
            const icX = sqR.left + sqR.width / 2,
              icY = sqR.top + sqR.height / 2;
            const goRight = spR.left > icX;
            const toX = goRight ? spR.left : spR.right;
            const toY = spR.top + 18;
            const vLen = Math.abs(icY - toY),
              hLen = Math.abs(toX - icX),
              total = vLen + hLen;
            // draw on separate SVG so main arrow stays intact
            let cascSvg = document.getElementById('casc-arrow-svg');
            if (!cascSvg) {
              cascSvg = document.createElementNS(
                'http://www.w3.org/2000/svg',
                'svg',
              );
              cascSvg.id = 'casc-arrow-svg';
              cascSvg.style.cssText =
                'position:fixed;left:0;top:0;pointer-events:none;z-index:519;overflow:visible;';
              document.body.appendChild(cascSvg);
            }
            cascSvg.style.width = vwA + 'px';
            cascSvg.style.height = vhA + 'px';
            cascSvg.style.display = 'block';
            cascSvg.setAttribute('viewBox', `0 0 ${vwA} ${vhA}`);
            cascSvg.innerHTML = `
        <circle cx="${icX}" cy="${icY}" r="3" fill="#50556a"/>
        <polyline points="${icX},${icY} ${icX},${toY} ${toX},${toY}"
          fill="none" stroke="#50556a" stroke-width="1.5"
          stroke-dasharray="${total}" stroke-dashoffset="${total}"
          style="animation:dashIn .3s ease forwards"/>`;
          });
        });
        ttHeader.innerHTML = '';
        ttHeader.appendChild(_sqSpan);
        ttHeader.appendChild(document.createTextNode(name));
        // Build rows — supports two key formats:
        //   '5'            → normal level row (number + text)
        //   '5:standVisor' → sub-row: coloured perk square under level 5, no text
        // Sub-rows are grouped with their parent level row via CSS.
        {
          // collect and sort all valid entries
          const rows = Object.entries(lvlDesc)
            .filter(([k]) => k !== 'combo' && k !== 'extended')
            .filter(([k]) => /^\d+$/.test(k) || /^\d+:[A-Za-z]/.test(k))
            .sort(([a], [b]) => {
              const nA = parseInt(a),
                nB = parseInt(b);
              if (nA !== nB) return nA - nB;
              // numeric-only keys before sub-keys of same number
              return /^\d+$/.test(a) ? -1 : 1;
            });

          // group: each level row can have sub-rows (N:perkId keys) that render
          // as a perk square in the LEFT column + their own text in the RIGHT column.
          // Each sub-row becomes its OWN tt-row (not merged), so text lines up neatly.
          const finalRows = []; // {lvl, txt, pid|null, isMain}

          for (const [key, txt] of rows) {
            const subMatch = key.match(/^(\d+):([A-Za-z]\w*)$/);
            if (subMatch) {
              finalRows.push({
                lvl: subMatch[1],
                pid: subMatch[2],
                txt: String(txt),
                isMain: false,
              });
            } else {
              finalRows.push({
                lvl: key,
                txt: String(txt),
                pid: null,
                isMain: true,
              });
            }
          }

          ttLevels.innerHTML = finalRows
            .map(({ lvl, txt, pid, isMain }) => {
              const col = LEVEL_COLOURS[parseInt(lvl)] || '#585e72';

              let leftHtml;
              if (isMain) {
                // normal row: show level number
                leftHtml = `<span class="tt-lvl" style="color:${col}">${lvl}</span>`;
              } else {

                const { name, hex } = resolvePerkInline(pid);
                leftHtml = `<span class="lvl-perk-sq" data-rid="${pid}"
                style="display:inline-block;width:8px;height:8px;background:${hex};
                border-radius:1px;cursor:pointer;transition:box-shadow .2s;">

              }

              return `<div class="tt-row${isMain ? '' : ' tt-row-sub'}">
              <span class="tt-lvl-col">${leftHtml}</span>
              <div class="tt-text">${txt ? renderLevelMD(txt) : ''}</div>
            </div>`;

            .join('');
        }

        // hover for left-column perk squares — use mouseenter/mouseleave on each
        // square directly (added after innerHTML is set) to avoid bubbling issues.
        ttLevels.querySelectorAll('.lvl-perk-sq').forEach((sq) => {
          sq.addEventListener('mouseenter', () => window.lvlSqShowTip(sq));
          sq.addEventListener('mouseleave', () => window.lvlSqHideTip(sq));

        // click delegation for inline <perk> tags AND left-column perk squares
        ttLevels.addEventListener(
          'click',
          (e) => {
            const ref = e.target.closest('.inline-perk-ref, .lvl-perk-sq');
            if (!ref) return;
            const rid = ref.dataset.rid;
            if (!rid) return;
            const target = [...document.querySelectorAll('.perk')].find(
              (pe) => pe.dataset.perkId === rid,
            );
            if (!target) return;
            hideTooltip();
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            setTimeout(() => {
              let fo = document.getElementById('focus-overlay');
              if (!fo) {
                fo = document.createElement('div');
                fo.id = 'focus-overlay';
                fo.style.cssText =
                  'position:fixed;inset:0;background:rgba(0,0,0,0);z-index:50;pointer-events:auto;transition:background .35s ease;';
                document.body.appendChild(fo);
              }
              const { hex } = resolvePerkInline(rid);
              requestAnimationFrame(() => {
                fo.style.background = `rgba(0,0,0,${FOCUS_DIM})`;
              });
              target.style.position = 'relative';
              target.style.zIndex = '51';
              target.style.transition = 'box-shadow .35s ease';
              target.style.boxShadow = `0 0 0 2px ${hex},0 0 30px ${hex}80`;
              function clearFocusRef() {
                fo.style.background = 'rgba(0,0,0,0)';
                target.style.boxShadow = '';
                setTimeout(() => {
                  fo.remove();
                  target.style.position =
                    target.style.zIndex =
                    target.style.transition =
                      '';
                }, 350);
              }
              fo.addEventListener('click', clearFocusRef, { once: true });
              setTimeout(() => {
                window.addEventListener('scroll', clearFocusRef, {
                  once: true,
                  passive: true,

                window.addEventListener('keydown', clearFocusRef, {
                  once: true,

              }, 400);
            }, 500);

          { capture: false },
        );

        // position & show synchronously — no timers, no rAF
        const ir = iconEl.getBoundingClientRect();
        const icX = ir.left + ir.width / 2;

        const tw = 340,

        const allCols = document.querySelectorAll('.col');
        const perkCol = iconEl.closest('.col');
        const isLastCol =
          allCols.length > 0 && perkCol === allCols[allCols.length - 1];

        const goRight = isLastCol ? false : icX + GAP + tw <= vw - 4;
        let x = goRight ? icX + GAP : icX - tw - GAP;
        if (x < 4) x = 4;
        tooltipEl.style.display = 'flex';
        tooltipEl.style.opacity = '0'; // measure without flash
        const maxH = Math.min(
          Math.floor(vh * MAX_TOOLTIP_HEIGHT_PERCENT),
          MAX_TOOLTIP_HEIGHT_PX,
        );
        tooltipEl.style.maxHeight = maxH + 'px';
        const actualH = Math.min(tooltipEl.scrollHeight, maxH);

        // prefer top-anchored: start near the top of the viewport with a small
        // margin, rather than centering on the icon which pushes it down.
        const TOP_ANCHOR = 16;
        let y = Math.min(icY - actualH / 2, TOP_ANCHOR);
        if (y + actualH > vh - 8) y = vh - actualH - 8;
        if (y < TOP_ANCHOR) y = TOP_ANCHOR;

        tooltipEl.style.left = x + 'px';
        tooltipEl.style.top = y + 'px';
        tooltipEl.style.opacity = '1';

        ttOverlay.style.display = 'block';
        ttOverlay.style.background = 'rgba(0,0,0,.6)';

        // ── SECONDARY WINDOWS: tiling layout ──
        // Right column split: extra (top half) + img (bottom half), each capped at half viewport height.
        // Combo goes to the right of that column (or below the pair if no horizontal room).
        const extraBox = document.getElementById('extra-box');
        const extraContent = document.getElementById('extra-content');
        const extraSvg = document.getElementById('extra-arrow-svg');
        const tipBox = document.getElementById('tip-box');
        const tipContent = document.getElementById('tip-content');
        const tipSvg = document.getElementById('tip-arrow-svg');
        const extendedBox = document.getElementById('extended-box');
        const extendedHeader = document.getElementById('extended-header');
        const extendedContent = document.getElementById('extended-content');
        const extendedSvg = document.getElementById('extended-arrow-svg');

        const imgHeader = document.getElementById('img-header');

        extraSvg.style.display = 'none';
        tipBox.style.display = 'none';
        tipSvg.style.display = 'none';

        extendedSvg.style.display = 'none';
        imgBox.style.display = 'none';
        imgArwSvg.style.display = 'none';
        img2Box.style.display = 'none';
        img2ArwSvg.style.display = 'none';
